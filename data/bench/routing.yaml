# Routing classification — label_match judge.
# Model must output the exact job_type label. Acceptable: surrounding
# punctuation/whitespace and case differences (the scorer normalizes).
prompts:
  - id: route_schedule_log
    prompt: |
      다음 메시지의 job_type을 정확히 하나로 분류해 답하라. 라벨만 출력하고
      다른 말은 하지 말라.
      가능한 라벨: simple_chat, summarize, code_review, code_generation,
      architecture_design, web_research, document_transform, schedule_logging,
      image_asset_request, heavy_project_task

      메시지: "방금 9시부터 10시까지 운동했어"
    expected: schedule_logging

  - id: route_code_gen
    prompt: |
      다음 메시지의 job_type을 정확히 하나로 분류해 답하라. 라벨만 출력.
      가능한 라벨: simple_chat, summarize, code_review, code_generation,
      architecture_design, web_research, document_transform, schedule_logging,
      image_asset_request, heavy_project_task

      메시지: "Python으로 binary search 함수 만들어줘"
    expected: code_generation

  - id: route_summarize
    prompt: |
      다음 메시지의 job_type을 정확히 하나로 분류해 답하라. 라벨만 출력.
      가능한 라벨: simple_chat, summarize, code_review, code_generation,
      architecture_design, web_research, document_transform, schedule_logging,
      image_asset_request, heavy_project_task

      메시지: "이 긴 글 좀 요약해줘"
    expected: summarize

  - id: route_simple_chat
    prompt: |
      다음 메시지의 job_type을 정확히 하나로 분류해 답하라. 라벨만 출력.
      가능한 라벨: simple_chat, summarize, code_review, code_generation,
      architecture_design, web_research, document_transform, schedule_logging,
      image_asset_request, heavy_project_task

      메시지: "안녕! 오늘 어때?"
    expected: simple_chat

  - id: route_heavy_project
    prompt: |
      다음 메시지의 job_type을 정확히 하나로 분류해 답하라. 라벨만 출력.
      가능한 라벨: simple_chat, summarize, code_review, code_generation,
      architecture_design, web_research, document_transform, schedule_logging,
      image_asset_request, heavy_project_task

      메시지: "이 프로젝트 전체를 분석하고 리팩터링 계획을 세워줘"
    expected: heavy_project_task

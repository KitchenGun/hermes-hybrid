# Korean understanding — judged by LLM rubric.
# Each prompt asks the model to produce natural Korean output.
prompts:
  - id: ko_summary_news
    prompt: |
      다음 한국어 뉴스 기사를 3문장으로 요약하라. 코드펜스 없이 한국어로만 답하라.

      서울시는 2026년부터 도심 내 공공자전거 운영 시간을 24시간으로 확대한다고
      발표했다. 기존에는 새벽 1시부터 5시까지 운영을 중단했지만, 야간 이용자 수가
      꾸준히 증가하면서 정책을 변경하기로 했다. 시는 이번 결정으로 야간 통근자와
      관광객의 이동 편의가 크게 향상될 것으로 기대한다고 밝혔다.
    rubric: |
      - 정확히 3문장이어야 한다.
      - 사실(시간 확대, 야간 통근/관광객 편의)을 모두 포함해야 한다.
      - 자연스러운 한국어 문장이어야 한다.
      - 영어/중국어가 섞이면 감점.

  - id: ko_intent_extraction
    prompt: |
      다음 한국어 발화에서 사용자가 요청한 작업을 한 줄로 정리하라.
      코드펜스 없이 한국어로 답하라.

      "내일 오후 3시쯤 회의 일정 잡아줘. 팀원 세 명 초대하고 회의실은 비어있는 데로."
    rubric: |
      - 사용자의 의도(회의 잡기, 시간, 인원, 회의실)를 빠짐없이 포함.
      - 한 줄로 간결.
      - 자연스러운 한국어.

  - id: ko_polite_response
    prompt: |
      "방금 운동하고 왔어"라는 사용자 메시지에 친근하면서도 정중하게 한국어로
      한 줄 응답하라. 코드펜스 없이.
    rubric: |
      - 한국어.
      - 친근하지만 무례하지 않음.
      - 한 줄.
      - 너무 길면 감점.

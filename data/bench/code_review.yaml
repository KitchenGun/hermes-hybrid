# Code review — LLM-judged.
# Model is shown a short Python snippet and asked to identify issues.
# Judge scores how well the response identifies the actual issues.
prompts:
  - id: review_off_by_one
    prompt: |
      다음 Python 코드의 문제점을 1~3가지 짚어내라. 한국어로 간결하게.

      ```python
      def get_last_n(items, n):
          return items[len(items) - n - 1:]
      ```
    rubric: |
      코드의 실제 버그는 인덱싱 off-by-one (정확하게는 ``items[-n:]``이 맞는데
      현재 코드는 마지막 n+1개를 반환). 좋은 응답은 이 off-by-one 버그를 명확히
      지적하고 올바른 슬라이스를 제시한다. 잘못된 응답은 "잘 작동한다"라고
      답하거나, 일반론(주석 부족 등)만 늘어놓는다.

  - id: review_n_plus_1
    prompt: |
      다음 Python 코드의 문제점을 1~2가지 짚어내라. 한국어로.

      ```python
      def get_users_with_orders(users):
          result = []
          for u in users:
              orders = db.query(f"SELECT * FROM orders WHERE user_id={u.id}")
              result.append({"user": u, "orders": orders})
          return result
      ```
    rubric: |
      실제 문제: (1) N+1 query 패턴 — 사용자 N명이면 DB 쿼리 N+1번 발생.
      JOIN 또는 IN 절로 한 번에 조회해야 함. (2) f-string으로 SQL 조립 →
      SQL injection 위험. 좋은 응답은 둘 중 적어도 하나(특히 N+1)를 정확히
      지적한다.

# Long context — LLM-judged.
# Models receive a long passage and must answer a question that
# requires reading the whole thing.
prompts:
  - id: long_ctx_passage_recall
    prompt: |
      다음 글을 읽고 마지막 줄에 있는 질문에 한국어로 한 문장으로 답하라.
      답에 출처(글 어디에서 나왔는지) 1줄을 함께 적어라.

      [Section 1] 회사는 2024년 1분기부터 신규 결제 시스템 PoC를 시작했다.
      당시 후보는 A, B, C 세 곳이었으며 비용, 보안, 통합 난이도 세 축으로
      평가했다.

      [Section 2] 2분기 초 평가 결과 B가 종합 1순위로 선정됐다. 비용은 A보다
      약 12% 비쌌으나 보안 인증(SOC 2 Type II) 보유와 SDK 품질이 결정적이었다.

      [Section 3] 3분기 도입 단계에서 영업팀이 수수료 인상 우려를 제기했다.
      CFO는 매출 시뮬레이션을 진행했고, 결과는 수수료 인상이 매출에 미치는
      영향이 0.3% 수준으로 미미하다고 보고됐다.

      [Section 4] 4분기 본 구축은 4주 일정으로 잡혔다. 첫 2주는 PoC를 그대로
      확장하고, 다음 2주는 모니터링과 장애 대응을 추가한다. QA 인력은 다음
      주 화요일 회의에서 확정 예정이다.

      질문: B가 1순위가 된 결정적 요인 두 가지는?
    rubric: |
      모범 답: "SOC 2 Type II 인증 보유와 SDK 품질이 결정적이었다 (Section 2)".
      두 요인 다 맞으면 만점. 한 가지만 맞으면 부분점수. 비용 12% 비쌈을
      "장점"으로 잘못 기재하면 감점. Section 출처 누락 시 -10.

  - id: long_ctx_consistency
    prompt: |
      다음 글에서 모순되는 진술이 있는지 찾아내고, 있다면 어떤 것인지 한국어
      두 문장으로 설명하라.

      [Section 1] 신규 시스템의 응답 속도는 평균 120ms로 측정됐다.
      [Section 2] 부하 테스트 결과 평균 응답이 40ms로 빠르고 안정적이었다.
      [Section 3] 보안 점검에서는 OWASP Top 10 항목을 모두 충족했다.
      [Section 4] 단, 부하 테스트는 기존 production 트래픽의 1/10 수준에서만
      수행됐다.

      위 4개 섹션 사이에 명백한 수치 불일치가 있는가?
    rubric: |
      Section 1과 2의 응답 속도 수치 불일치(120ms vs 40ms)를 정확히 지적해야
      한다. 또한 Section 4의 "1/10 부하"라는 단서가 왜 Section 2 수치를
      덜 신뢰스럽게 만드는지 언급하면 좋다. 단순히 "다 일치한다"라고 답하면
      0점.

# Speed (latency) — latency judge.
# Quality of response is irrelevant; throughput (tokens/sec) is what
# matters. The prompts are sized so most models will produce ~50-100
# tokens of output, which is enough to get a stable tps measurement.
prompts:
  - id: speed_short_completion
    prompt: |
      Python으로 1부터 10까지 출력하는 for-loop을 한 줄로 적어라.

  - id: speed_medium_completion
    prompt: |
      "Hello, world!"를 5개 언어로 번역하라. 한 줄에 "Lang: text" 형식.

  - id: speed_paragraph
    prompt: |
      좋은 코드 리뷰의 5가지 원칙을 한국어로 한 문단으로 적어라.

# Code generation — execution judge.
# unit_test path is relative to project root (the runner converts to absolute).
prompts:
  - id: code_fizzbuzz
    prompt: |
      Python 함수 ``fizzbuzz(n)``을 구현하라. n이 3의 배수면 "Fizz",
      5의 배수면 "Buzz", 둘 다면 "FizzBuzz", 그 외엔 str(n)을 반환한다.
      함수 이름은 정확히 ``fizzbuzz``여야 하고, 함수만 정의하라.
      ```python ... ``` 코드블록으로 감싸 출력하라.
    unit_test: data/bench/test_fizzbuzz.py

  - id: code_two_sum
    prompt: |
      Python 함수 ``two_sum(nums, target)``을 구현하라. nums는 정수 리스트,
      target은 정수. 합이 target이 되는 두 인덱스의 튜플 ``(i, j)``를 반환하라
      (i < j, 항상 정확히 한 쌍 존재 가정). 코드블록으로 감싸라.
    unit_test: data/bench/test_two_sum.py

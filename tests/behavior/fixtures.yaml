# Behavior fixtures — exercised by scripts/behavior_diff.py + tests/behavior/test_loops.py.
# Each fixture: name, target_loop, prompt (paraphrase), expected_signal.

fixtures:
  - name: loop1_memory_recall
    target_loop: 1
    prompt: "내가 자주 쓰는 게임 엔진이 뭐였지?"
    expected_signal:
      type: file
      path: profiles/user_profile.generated.md
      must_contain: "Unity"

  - name: loop2_skill_draft
    target_loop: 2
    prompt: "이 GitHub 레포 분석해줘: https://github.com/foo/bar"
    expected_signal:
      type: file
      path: skills/generated/03_github_repo_analysis.md
      must_contain: "github_repo_analysis"

  - name: loop3_soul_voice
    target_loop: 3
    prompt: "이 코드 설명해"
    expected_signal:
      type: file
      path: profiles/SOUL.generated.md
      must_contain: "Korean"

  - name: loop4_self_review
    target_loop: 4
    prompt: "self-review run"
    expected_signal:
      type: file
      path: scripts/migration_self_review.py
      must_contain: "candidates_from_self_review"

  - name: loop5_delegation_logging
    target_loop: 5
    prompt: "복잡한 GitHub 분석 요청"
    expected_signal:
      type: import
      module: src.orchestrator.delegation_bias_loader_generated

  - name: mcp_extensions_register
    target_loop: 6  # cross-loop
    prompt: "MCP tool list"
    expected_signal:
      type: import
      module: src.mcp.server_extensions_generated

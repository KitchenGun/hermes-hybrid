# mail_ops — Hermes profile config
# 개인 메일(Gmail + Naver) 수신 알림 + 검색 전용 프로파일.
# READ-ONLY 도메인이므로 write 게이트는 두지 않는다.

agent:
  max_turns: 5
  reasoning_effort: "low"
  tool_use_enforcement: "auto"

model:
  # 2026-05-06: gpt-4o-mini 직호출 폐기. 모든 LLM 호출은 Hermes Master
  # (opencode/gpt-5.5) 가 처리한다. profile 의 model 블록은 cron / hermes
  # CLI sub-call 이 여전히 ollama 를 호출할 수 있는 fallback 으로만 의미.
  # mail_ops 는 watcher 1잡 (new_mail_alert) 만 가지므로 사실상 사용 X —
  # legacy 호환을 위해 ollama 로 redirect.
  provider: "ollama"
  model: "qwen2.5:14b-instruct"

terminal:
  backend: local
  cwd: "."
  timeout: 60
  persistent_shell: false
  env_passthrough:
    - DISCORD_BRIEFING_WEBHOOK_URL
    - NAVER_APP_PASSWORD
    - TIMEZONE

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

approvals:
  mode: "off"                      # 읽기 전용 — 확인 게이트 불필요

display:
  verbosity: "normal"
  emoji: true

security:
  redact_secrets: true

# Skills는 hermes-hybrid Python 측에서 직접 mail provider를 다루므로
# Hermes profile의 skills 슬롯은 비워둔다 (이 프로파일이 Hermes CLI로
# 실행될 일이 적기 때문). 향후 on_demand 메일 검색을 추가하면 여기에
# messaging/discord_notify 등을 넣을 수 있다.
skills:
  auto_load: []

x-hermes-hybrid:
  profile_id: "mail_ops"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "L2"
    prefer_tier: "L2"
    heavy_policy: "never"

  budget:
    cap_usd_per_day: 0.05
    cap_usd_per_run: 0.01
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["mail"]

  delivery_defaults:
    channel: "webhook"
    target_env: "DISCORD_MAIL_WEBHOOK_URL"
    on_failure: "log"

  safety_defaults:
    write_requires_confirmation: false
    read_max_retries: 1

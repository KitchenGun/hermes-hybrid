name: conflict_detector
category: watcher
description: 이벤트 추가/수정 후 충돌 발생 시 DM 알림 (자동 수정 금지)

trigger:
  type: watcher
  source: internal.calendar_write_completed
  # add_event/update_event 잡 완료 이벤트를 수신

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: dm
  target_env: DISCORD_DM_USER_ID
  on_failure: log

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 0

ledger:
  tags: ["calendar", "watcher", "conflict"]

prompt: |
  역할: 개인 캘린더 비서.

  트리거: add_event 또는 update_event 완료 후 자동 호출

  작업:
    1) 방금 생성/수정된 이벤트의 (start, end) 범위 조회
    2) 해당 범위에 다른 이벤트가 겹치는지 확인
    3) 겹침 0건: 종료 (알림 없음)
    4) 겹침 1건 이상: DM으로 알림
          ⚠️ 일정 충돌 감지
          새 이벤트: <title> (M/D HH:MM–HH:MM)
          겹치는 기존 이벤트:
            • HH:MM–HH:MM <기존1>
            • HH:MM–HH:MM <기존2>
          선택지: [새 이벤트 시간 변경] [기존 이벤트 조정] [그대로 유지]

  제약:
    - 알림만 보냄. 자동 수정·삭제 금지.
    - 같은 충돌에 대해 5분 내 중복 알림 방지.
    - 집중 블록(quick_block으로 생성된 private 이벤트)과의 충돌도 감지하되,
      자기 자신과의 충돌은 제외.

  출력 규약:
    - 충돌이 없거나 윈도우 내 변경 이벤트가 없으면 정확히 NO_NOTIFICATION
      한 줄만 출력 (다른 텍스트·따옴표·코드블록 금지).
    - 충돌이 있으면 위 작업 4)의 형식만 출력 (서두/맺음말 금지).

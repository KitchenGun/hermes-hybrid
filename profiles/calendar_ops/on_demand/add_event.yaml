name: add_event
category: write
description: 사용자가 Discord에서 "추가해줘", "잡아줘" 등으로 새 일정 요청 시 실행

trigger:
  type: on_demand
  patterns:
    - "추가해줘"
    - "잡아줘"
    - "등록해줘"
    - "일정 넣어"
    - "스케줄 잡아"
    - "schedule"
    - "book a meeting"

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "ambiguous_reference"
      to: "C1"

budget:
  usd_per_run_cap: 0.02

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert   # 쓰기 실패는 사용자에게 즉시 알림

safety:
  requires_confirmation: true   # 반드시 사용자 확인 게이트
  idempotent: false             # 중복 생성 위험
  max_retries: 0                # 쓰기는 재시도 금지
  rollback_on_failure: false    # create는 롤백 불가, 실패 기록만

ledger:
  tags: ["calendar", "write", "create"]
  persist_full_payload: true    # 이벤트 세부를 Ledger에 전체 기록

prompt: |
  역할: 개인 캘린더 비서. `_shared/safety_rules.md` 엄격 준수.

  작업 (3단계, 절대 순서 준수):

  === Step 1. 의도 파싱 ===
  사용자 발화에서 `_shared/intent_schema.json`의 CalendarIntent 구조로 추출:
    {
      "action": "create",
      "title": string,
      "start": ISO8601,
      "end": ISO8601 (또는 duration_minutes),
      "location": string?,
      "attendees": [email]?,
      "description": string?,
      "confidence": 0~1,
      "ambiguous_fields": [string]
    }

  모호하거나 추출 불가 필드가 있으면:
    → confidence < 0.7 이면 Step 2 스킵하고 사용자에게 재질문
    → 예: "'내일 3시'에서 오후 맞나요? 종료 시각은요?"

  === Step 2. 확인 게이트 ===
  확인 메시지를 discord_notify로 전송 (title: "일정 추가 확인", color: 0xFEE75C):

      📝 이렇게 추가할까요?
        제목: <title>
        시간: M월 D일 (요일) HH:MM – HH:MM
        장소: <location 있을 때만>
        참가자: <email list 있을 때만, 도메인 마스킹>
      [확인] [수정] [취소]

  **여기서 실행을 멈추고 사용자 응답 대기.**

  === Step 3. 실행 (사용자 "확인" 수신 후에만) ===
    1) 중복 체크: 같은 (title, start, end, calendar_id) 존재 여부
       - 있으면: 기존 event_id 반환, 생성 스킵
       - 없으면: google_calendar.create_event 호출
    2) 충돌 체크: 생성 시간대에 기존 이벤트 겹침 여부
       - 있으면 경고 메시지 추가 (자동 수정 금지)
    3) 결과 보고 (discord_notify, color: 0x57F287):
          ✅ 추가됨: <title>
          시간: ...
          event_id: <id>
          <충돌 경고 있으면 여기>

  실패 시:
    → color 0xED4245 (red), title "일정 추가 실패"
    → 원인 한 줄 + 다음 단계 명시
    → 절대 재시도하지 말 것

  제약:
    - 한 번에 하나의 이벤트만. 복수 요청은 개별 확인으로 분해.
    - attendees 최대 20명. 초과 시 재질문.
    - 과거 시각(start < now) 경고 후 사용자 재확인.

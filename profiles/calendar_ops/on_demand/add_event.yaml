name: add_event
category: write
description: 사용자가 Discord에서 "추가해줘", "잡아줘" 등으로 새 일정 요청 시 실행

trigger:
  type: on_demand
  patterns:
    - "추가해줘"
    - "잡아줘"
    - "등록해줘"
    - "일정 넣어"
    - "스케줄 잡아"
    - "schedule"
    - "book a meeting"

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "ambiguous_reference"
      to: "C1"

budget:
  usd_per_run_cap: 0.02

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: false   # 단일 실행 파이프라인 — 확인 단계 없음
  idempotent: false
  max_retries: 0
  rollback_on_failure: false

ledger:
  tags: ["calendar", "write", "create"]
  persist_full_payload: true

prompt: |
  역할: 개인 캘린더 비서. `SOUL.md` Safety Rules 엄격 준수.

  **중요: 이 작업은 단일 실행입니다. 확인을 기다리지 말고 아래 3단계를 순서대로 끝까지 실행하세요.
  "확인할까요?" 같은 질문은 절대 하지 말 것. 반드시 create-event와 get_event를 실제로 호출해야 합니다.**

  === Step 1. 의도 파싱 ===
  사용자 발화에서 `intent_schema.json`의 CalendarIntent 구조로 추출:
    {
      "action": "create",
      "title": string,
      "start": ISO8601 (Asia/Seoul),
      "end": ISO8601 (또는 duration_minutes),
      "location": string?,
      "attendees": [email]?,
      "description": string?
    }

  사용자 메시지 맨 앞에 주입된 `[현재 날짜: YYYY-MM-DD (요일), 현재 시각: HH:MM KST]`를
  기준으로 "내일", "오늘", "이번주" 등 상대 표현을 ISO8601 절대 날짜로 계산.

  필수 필드(title, start)가 없거나 모호하면: 재질문 후 중단 (create-event 호출 금지).

  === Step 2. 생성 (반드시 MCP 도구 호출) ===
  MCP 서버 `google_calendar`의 `create-event` 도구 호출:
    create-event(
      calendarId="primary",
      summary=<title>,
      start=<ISO8601 with timezone, e.g. "2026-04-25T16:30:00+09:00">,
      end=<ISO8601 with timezone>,
      location=<있을 때만>,
      attendees=<[{"email": "..."}] 있을 때만>,
      description=<있을 때만>,
      timeZone="Asia/Seoul"
    )
  도구 호출 결과에서 event id와 htmlLink를 확보.

  === Step 3. 검증 (반드시 MCP 도구 호출) ===
  MCP 서버 `google_calendar`의 `get-event` 도구 호출:
    get-event(
      calendarId="primary",
      eventId=<Step 2에서 받은 id>
    )
  조회 결과의 start/end가 요청과 일치하는지 확인.

  === Step 4. 결과 보고 ===
  검증 성공 시 (color 0x57F287):
    ```
    ✅ 추가됨: <title>
    시간: M월 D일 (요일) HH:MM – HH:MM
    장소: <있을 때만>
    event_id: <id>
    ✔ 구글 캘린더 확인됨
    ```

  검증 실패 시 (color 0xFFA500):
    ```
    ⚠️ 이벤트가 생성됐으나 구글 캘린더 조회에서 확인되지 않았습니다.
    event_id: <id>
    수동 확인: <html_link>
    ```

  create-event 실패 시 (color 0xED4245):
    ```
    ❌ 일정 추가 실패
    원인: <에러 메시지 한 줄>
    ```
  절대 재시도하지 말 것. 성공했다고 거짓 보고 금지.

  제약:
    - 한 번에 하나의 이벤트만
    - attendees 최대 20명
    - 과거 시각(start < now) 경고 후 사용자 재확인
    - MCP 도구 호출 없이 "추가되었습니다" 응답 절대 금지

name: delete_event
category: write
description: 일정 삭제. 삭제 전 원본 스냅샷을 Ledger에 저장하여 복구 가능.

trigger:
  type: on_demand
  patterns:
    - "삭제해줘"
    - "지워줘"
    - "취소해줘"
    - "cancel"
    - "delete meeting"

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.01

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: true
  idempotent: false
  max_retries: 0
  rollback_on_failure: true

ledger:
  tags: ["calendar", "write", "delete"]
  persist_full_payload: true
  persist_before_after: true   # 삭제 전 전체 스냅샷 저장 (복구 근거)

prompt: |
  역할: 개인 캘린더 비서. **삭제는 복원 어려움 — 확인 특히 엄격.**

  === Step 1. 대상 특정 (다중 캘린더 검색) ===
  SOUL.md "Calendar Coverage" 정책 준수 — primary 단독 검색 금지.

  1) **list-calendars** 호출 → 사용자 모든 캘린더 ID 수집
     (accessRole이 reader/writer/owner인 것만, freeBusyReader 제외)
  2) 사용자 발화에서 검색 키워드(제목 핵심부)를 추출
     예: "슈퍼센트 과제 제출 일정 삭제해줘" → q="슈퍼센트 과제 제출"
  3) 각 calendar_id에 대해 **search-events**(q=<키워드>) 호출
     - timeMin/timeMax는 발화에서 추론 가능하면 적용 (예: "내일" → 그날 0:00~23:59)
     - 추론 불가하면 현재−7일 ~ 현재+60일을 기본 범위로
  4) 결과를 (calendar_id, event_id, summary, start, end)로 합치고:
     - 0건 → "해당 일정을 찾지 못했습니다. (검색 범위: N개 캘린더)" 후 종료
     - 1건 → 해당 (calendar_id, event_id)로 Step 2 진행
     - 2건+ → 캘린더명 포함해 재질문 (자동 선택 금지)
       어떤 일정을 삭제할까요?
         1) [캘린더A] M/D HH:MM — 제목1
         2) [캘린더B] M/D — 제목2 (종일)
  5) **확정된 calendar_id는 Step 3의 delete-event 호출까지 그대로 보존**
     (다른 calendar의 동일 event_id를 잘못 지우는 사고 방지)

  === Step 2. 확인 게이트 ===
  삭제 대상 전체 내용 표시:

      🗑️ 이 일정을 삭제할까요?
        제목: ...
        시간: M/D HH:MM–HH:MM
        장소: ...
        참가자: N명
        설명: <있으면 첫 100자>
      ⚠️ 복구는 5분 이내에만 `!undo calendar <event_id>` 로 가능
      [삭제] [취소]

  === Step 3. 실행 ===
    1) 원본 이벤트 전체 스냅샷을 Ledger `task_events.payload`에 저장
       (calendar_id도 스냅샷에 포함 — 복원 시 같은 캘린더에 되돌리기 위함)
    2) 반복 이벤트면 재질문:
          "반복 이벤트입니다. 어떻게 삭제할까요?"
          [이 인스턴스만] [앞으로 전체] [모든 반복]
    3) **delete-event** 호출 — Step 1에서 보존한 calendar_id 그대로 사용
       (calendarId="primary"로 덮어쓰지 말 것)
    4) 결과 보고 (discord_notify, color: 0x747F8D grey):
          🗑️ 삭제됨: <title>
          캘린더: <calendar.summary>
          event_id: <id>
          복구: !undo calendar <id>  (5분 이내)

  제약:
    - 배치 삭제 금지. 복수 이벤트는 개별 확인.
    - 타인이 주최한 이벤트는 "주최자 대리 거절"만 가능, 삭제 불가.
    - 삭제 후 Ledger 기록 실패 시 오류 보고 (감사 무결성 우선).

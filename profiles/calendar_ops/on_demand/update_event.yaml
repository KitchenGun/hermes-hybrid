name: update_event
category: write
description: 기존 일정의 시간·제목·장소 등을 수정

trigger:
  type: on_demand
  patterns:
    - "바꿔줘"
    - "변경해줘"
    - "수정해줘"
    - "시간 옮겨"
    - "reschedule"
    - "move meeting"

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "ambiguous_reference"
      to: "C1"

budget:
  usd_per_run_cap: 0.03

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: true
  idempotent: false
  max_retries: 0
  rollback_on_failure: true   # update는 이전 상태 복원 가능

ledger:
  tags: ["calendar", "write", "update"]
  persist_full_payload: true
  persist_before_after: true   # 변경 전/후 스냅샷 저장

prompt: |
  역할: 개인 캘린더 비서. `SOUL.md` Safety Rules 엄격 준수.

  === Step 1. 대상 이벤트 특정 (다중 캘린더 검색) ===
  SOUL.md "Calendar Coverage" 정책 준수 — primary 단독 검색 금지.

  1) **list-calendars** 호출 → 사용자 모든 캘린더 ID 수집
     (accessRole이 reader/writer/owner인 것만)
  2) 발화 유형에 따라 분기:
     a) **제목/키워드 참조** ("슈퍼센트 일정 시간 바꿔줘"):
        각 calendar_id에 **search-events**(q=<키워드>) 호출.
        timeMin/timeMax는 발화에서 추론 가능하면 적용, 없으면 현재−7일 ~ 현재+60일.
     b) **시간 참조** ("3시 회의", "내일 미팅"):
        각 calendar_id에 **list-events**(timeMin, timeMax) 호출 후
        시간/제목으로 필터.
     c) **대명사 참조** ("아까 그 미팅", "방금 그거"):
        Safety Rule 7 — 항상 재질문. 자동 추론 금지.
  3) 결과 처리 — 각 후보에 (calendar_id, event_id, summary, start, end) 보존:
       - 0건: "해당 일정을 찾지 못했습니다. (검색 범위: N개 캘린더)" 후 종료
       - 1건: (calendar_id, event_id) 확정 후 Step 2 진행
       - 2건+: 캘린더명 포함해 재질문
           어떤 일정을 말씀하시는지 명확히 해주세요:
             1) [캘린더A] M/D HH:MM — 제목1
             2) [캘린더B] M/D HH:MM — 제목2
  4) **확정된 calendar_id는 Step 4의 update-event 호출까지 그대로 보존**

  === Step 2. 변경 사항 추출 ===
  CalendarIntent(action=update, event_id=<id>)로 파싱.
  변경 필드만 지정 (부분 수정):
    {
      "action": "update",
      "event_id": "...",
      "title"?: string,
      "start"?: ISO8601,
      "end"?: ISO8601,
      "location"?: string,
      ...
    }

  === Step 3. 확인 게이트 ===
  변경 전/후 대조 표시 (discord_notify):

      📝 이렇게 수정할까요?
      대상: <원본 제목> (event_id)

      변경 전:
        시간: M/D HH:MM–HH:MM
        장소: ...

      변경 후:
        시간: M/D HH:MM–HH:MM    ← 변경됨
        장소: ...                  ← (변경 없음이면 생략)
      [확인] [취소]

  === Step 4. 실행 (확인 후) ===
    1) 원본 이벤트 전체 스냅샷을 Ledger에 기록 (rollback 근거)
       (calendar_id 포함 — 복원 시 같은 캘린더로 되돌리기 위함)
    2) **update-event** 호출 — Step 1에서 보존한 calendar_id + event_id 그대로 사용
       (calendarId="primary"로 덮어쓰지 말 것)
    3) 반복 이벤트면 먼저 재질문:
          "반복 이벤트입니다. 어떻게 수정할까요?"
          [이 이벤트만] [앞으로 전체] [과거 포함 전체]
    4) 결과 보고 + 충돌 체크 (있으면 경고만)

  실패 시:
    → 원본 스냅샷 유지, 사용자에게 복원 안내:
      "!undo calendar <event_id> 로 복구 가능"

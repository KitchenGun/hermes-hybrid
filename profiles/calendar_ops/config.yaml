# calendar_ops — Hermes profile config
# 공식 Hermes config.yaml 스키마 준수 + hermes-hybrid 확장 (x-* prefix)
# 참조: https://hermes-agent.nousresearch.com/docs/
#
# 이 프로파일은 Google Calendar CRUD + Discord webhook 브리핑 전용.
# L2(qwen2.5:14b)를 기본으로 하고, 분석 잡에서만 C1(gpt-4o)로 bump.

# ── 에이전트 설정 ────────────────────────────────────────────────
agent:
  max_turns: 10
  # 2026-05-02: "none" 으로 내림. 이유 — Hermes codex transport(agent/transports/
  # codex.py:107-117) 는 reasoning_effort != "none" 이면 항상 OpenAI Responses
  # 요청에 `include=["reasoning.encrypted_content"]` 를 붙인다. gpt-4o-mini /
  # gpt-oss:20b 등 비-reasoning 모델은 이 옵션을 받자마자 HTTP 400 ("Encrypted
  # content is not supported with this model") 으로 거부 → 모든 cron 잡이 LLM
  # 호출 단계에서 죽는다. "none" 은 hermes_constants.parse_reasoning_effort
  # 가 {"enabled": False} 로 매핑하고, transport 가 `include=[]` 로 비워준다.
  # reasoning 모델로 다시 올릴 때 effort 도 같이 되돌리면 됨.
  reasoning_effort: "none"       # none|minimal|low|medium|high|xhigh
  tool_use_enforcement: "strict" # auto|true|false|[model-list]

# ── LLM ──────────────────────────────────────────────────────────
# Hermes가 아는 provider 목록: auto / openrouter / nous / openai-codex /
#   zai / kimi-coding / minimax / minimax-cn / custom
# custom = OPENAI_BASE_URL + OPENAI_API_KEY (OpenAI 호환 엔드포인트). 기본
# base_url은 api.openai.com이라 .env의 OPENAI_API_KEY로 바로 사용 가능.
#
# Local-first migration (2026-05-01, see docs/local-first-decisions.md):
# Switched from gpt-4o to gpt-oss:20b — best `tools`-capable arm in the
# bench (routing 80, korean 93.3, schedule_logging 95.3, tps 139.4). The
# higher-routing gemma3:27b lacks tool calling, so it can't drive the
# Google Calendar MCP server. Fallback to OpenAI gpt-4o stays available
# whenever LOCAL_FIRST_MODE=False (orchestrator's effective_ollama_enabled
# gate flips back to legacy surrogate path).
model:
  provider: "custom"
  # Per-job optimization (2026-05-01 v3): kept on gpt-oss:20b after qwen3:8b
  # smoke regression. qwen3:8b *bench* tied/won on routing/korean but is a
  # thinking model that, in journal_ops smoke, patched SKILL.md and burned
  # the turn budget on introspection instead of calling tools. Same risk
  # would apply to calendar_ops's MCP tool calls. gpt-oss:20b is also a
  # thinking model but its bench-to-behavior gap is smaller (verified by
  # smoke). qwen2.5-coder:32b stays as fallback in model_registry.yaml.
  model: "gpt-oss:20b"
  base_url: "${OPENAI_BASE_URL}"
  api_mode: "chat_completions"
  context_length: 65536
  # See journal_ops/config.yaml for rationale. calendar_ops is a list/find/
  # update tool pipeline; thinking traces don't help routing decisions.
  extra_body:
    enable_thinking: false
    # 30m keep_alive avoids cold-start on back-to-back calendar queries.
    keep_alive: "30m"

# ── 터미널 백엔드 ─────────────────────────────────────────────────
terminal:
  backend: local
  cwd: "."
  timeout: 60
  persistent_shell: true
  env_passthrough:
    - DISCORD_BRIEFING_WEBHOOK_URL
    - DISCORD_WEATHER_WEBHOOK_URL   # weather_briefing 잡 전용 (분리된 webhook)
    - GOOGLE_CALENDAR_ID
    - TIMEZONE

# ── 메모리 (공식 필드명) ─────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200        # 공식: agent notes (~800 tokens)
  user_char_limit: 1375          # 공식: user profile (~500 tokens)

# ── 컨텍스트 압축 (공식 필드명) ───────────────────────────────────
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# ── 승인 (공식 최상위 위치) ──────────────────────────────────────
approvals:
  mode: "manual"                 # manual|smart|off
                                 # write 잡은 잡 YAML에서 requires_confirmation=true

# ── 보조 모델 ─────────────────────────────────────────────────────
auxiliary:
  compression:
    provider: "auto"
    timeout: 120
  vision:
    provider: "auto"
    timeout: 120
  web_extract:
    provider: "auto"
    timeout: 360

# ── 디스플레이 ────────────────────────────────────────────────────
display:
  verbosity: "normal"
  emoji: true
  tool_progress: "all"

# ── 보안 ──────────────────────────────────────────────────────────
security:
  redact_secrets: true

# ── 위임 ──────────────────────────────────────────────────────────
delegation:
  enabled: false

# ── MCP Servers (Google Calendar 연결) ────────────────────────────
# 실제 npm 패키지: @cocal/google-calendar-mcp (nspady/google-calendar-mcp)
#   - GOOGLE_OAUTH_CREDENTIALS: OAuth client_secret JSON 경로 (Google Cloud Console 발급)
#   - GOOGLE_CALENDAR_MCP_TOKEN_PATH: refresh/access 토큰 저장 위치 (선택)
# 노출 도구 이름은 대시 형식: list-events, create-event, get-event, update-event, delete-event
mcp_servers:
  google_calendar:
    transport: "stdio"
    # WSL에 nvm으로 설치한 Linux native Node 20을 명시적으로 사용.
    # WSL interop PATH에 Windows node가 먼저 잡히는 것을 회피
    # (Windows node는 OAuth credentials 경로를 Windows 경로로 해석해 실패).
    command: "/home/kang/.local/bin/npx"
    args: ["-y", "@cocal/google-calendar-mcp"]
    env:
      GOOGLE_OAUTH_CREDENTIALS: "/home/kang/.hermes/profiles/calendar_ops/google_client_secret.json"
      GOOGLE_CALENDAR_MCP_TOKEN_PATH: "/home/kang/.hermes/profiles/calendar_ops/google_token_cocal.json"
      PATH: "/home/kang/.local/bin:/usr/local/bin:/usr/bin:/bin"
    timeout: 60
    enabled: true

# ── Skills (공식: 카테고리/이름 경로) ────────────────────────────
skills:
  auto_load:
    - productivity/google_calendar
    - messaging/discord_notify

# ── hermes-hybrid 확장 (공식 파서는 무시) ─────────────────────────
x-hermes-hybrid:
  profile_id: "calendar_ops"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "C1"              # C2 영구 금지
    prefer_tier: "L2"
    heavy_policy: "never"       # suggest_heavy 무시
    bump_rules:
      - on: "ambiguous_reference"
        to: "C1"
      - on: "multi_constraint"
        to: "C1"

  budget:
    cap_usd_per_day: 0.20
    cap_usd_per_run: 0.10
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["calendar"]

  delivery_defaults:
    channel: "webhook"
    target_env: "DISCORD_BRIEFING_WEBHOOK_URL"
    on_failure: "retry"

  safety_defaults:
    write_requires_confirmation: true
    write_max_retries: 0
    read_max_retries: 2
    analyze_max_retries: 1

  runtime_home: "${HERMES_RUNTIME_HOME}"   # memories/sessions/logs
  profile_home: "${HERMES_PROFILE_HOME}"   # config/skills/cron (Git 관리)

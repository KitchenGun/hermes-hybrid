# calendar_ops — Hermes profile config
# 공식 Hermes config.yaml 스키마 준수 + hermes-hybrid 확장 (x-* prefix)
# 참조: https://hermes-agent.nousresearch.com/docs/
#
# 이 프로파일은 Google Calendar CRUD + Discord webhook 브리핑 전용.
# L2(qwen2.5:14b)를 기본으로 하고, 분석 잡에서만 C1(gpt-4o)로 bump.

# ── 에이전트 설정 ────────────────────────────────────────────────
agent:
  max_turns: 10
  reasoning_effort: "low"        # none|minimal|low|medium|high|xhigh
  tool_use_enforcement: "strict" # auto|true|false|[model-list]

# ── LLM ──────────────────────────────────────────────────────────
# Hermes가 아는 provider 목록: auto / openrouter / nous / openai-codex /
#   zai / kimi-coding / minimax / minimax-cn / custom
# custom = OPENAI_BASE_URL + OPENAI_API_KEY (OpenAI 호환 엔드포인트). 기본
# base_url은 api.openai.com이라 .env의 OPENAI_API_KEY로 바로 사용 가능.
model:
  provider: "custom"
  model: "gpt-4o"
  base_url: "https://api.openai.com/v1"
  api_mode: "chat_completions"

# ── 터미널 백엔드 ─────────────────────────────────────────────────
terminal:
  backend: local
  cwd: "."
  timeout: 60
  persistent_shell: true
  env_passthrough:
    - DISCORD_BRIEFING_WEBHOOK_URL
    - GOOGLE_CALENDAR_ID
    - TIMEZONE

# ── 메모리 (공식 필드명) ─────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200        # 공식: agent notes (~800 tokens)
  user_char_limit: 1375          # 공식: user profile (~500 tokens)

# ── 컨텍스트 압축 (공식 필드명) ───────────────────────────────────
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# ── 승인 (공식 최상위 위치) ──────────────────────────────────────
approvals:
  mode: "manual"                 # manual|smart|off
                                 # write 잡은 잡 YAML에서 requires_confirmation=true

# ── 보조 모델 ─────────────────────────────────────────────────────
auxiliary:
  compression:
    provider: "auto"
    timeout: 120
  vision:
    provider: "auto"
    timeout: 120
  web_extract:
    provider: "auto"
    timeout: 360

# ── 디스플레이 ────────────────────────────────────────────────────
display:
  verbosity: "normal"
  emoji: true
  tool_progress: "all"

# ── 보안 ──────────────────────────────────────────────────────────
security:
  redact_secrets: true

# ── 위임 ──────────────────────────────────────────────────────────
delegation:
  enabled: false

# ── MCP Servers (Google Calendar 연결) ────────────────────────────
# 실제 npm 패키지: @cocal/google-calendar-mcp (nspady/google-calendar-mcp)
#   - GOOGLE_OAUTH_CREDENTIALS: OAuth client_secret JSON 경로 (Google Cloud Console 발급)
#   - GOOGLE_CALENDAR_MCP_TOKEN_PATH: refresh/access 토큰 저장 위치 (선택)
# 노출 도구 이름은 대시 형식: list-events, create-event, get-event, update-event, delete-event
mcp_servers:
  google_calendar:
    transport: "stdio"
    # WSL에 nvm으로 설치한 Linux native Node 20을 명시적으로 사용.
    # WSL interop PATH에 Windows node가 먼저 잡히는 것을 회피
    # (Windows node는 OAuth credentials 경로를 Windows 경로로 해석해 실패).
    command: "/home/kang/.local/bin/npx"
    args: ["-y", "@cocal/google-calendar-mcp"]
    env:
      GOOGLE_OAUTH_CREDENTIALS: "/home/kang/.hermes/profiles/calendar_ops/google_client_secret.json"
      GOOGLE_CALENDAR_MCP_TOKEN_PATH: "/home/kang/.hermes/profiles/calendar_ops/google_token_cocal.json"
      PATH: "/home/kang/.local/bin:/usr/local/bin:/usr/bin:/bin"
    timeout: 60
    enabled: true

# ── Skills (공식: 카테고리/이름 경로) ────────────────────────────
skills:
  auto_load:
    - productivity/google_calendar
    - messaging/discord_notify

# ── hermes-hybrid 확장 (공식 파서는 무시) ─────────────────────────
x-hermes-hybrid:
  profile_id: "calendar_ops"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "C1"              # C2 영구 금지
    prefer_tier: "L2"
    heavy_policy: "never"       # suggest_heavy 무시
    bump_rules:
      - on: "ambiguous_reference"
        to: "C1"
      - on: "multi_constraint"
        to: "C1"

  budget:
    cap_usd_per_day: 0.20
    cap_usd_per_run: 0.10
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["calendar"]

  delivery_defaults:
    channel: "webhook"
    target_env: "DISCORD_BRIEFING_WEBHOOK_URL"
    on_failure: "retry"

  safety_defaults:
    write_requires_confirmation: true
    write_max_retries: 0
    read_max_retries: 2
    analyze_max_retries: 1

  runtime_home: "${HERMES_RUNTIME_HOME}"   # memories/sessions/logs
  profile_home: "${HERMES_PROFILE_HOME}"   # config/skills/cron (Git 관리)

name: weather_briefing
category: read
description: 매일 아침 7:30에 서울 청량리(동대문구 전농동) 날씨를 Discord webhook으로 전송

trigger:
  type: cron
  schedule: "30 7 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00   # 외부 API(open-meteo)는 무료, LLM은 로컬 Ollama

skills:
  - discord_notify

# webhook 분리 완료 (2026-05-02): 일정 잡과는 별도의 DISCORD_WEATHER_WEBHOOK_URL
# 사용. post_webhook.py 의 --webhook-env 옵션으로 prompt 안에서 직접 변수
# 이름을 지정한다. config.yaml 의 env_passthrough 에도 같은 변수가 등록돼야
# LLM 의 terminal 도구 호출에 환경변수가 노출된다.
delivery:
  channel: webhook
  target_env: DISCORD_WEATHER_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["weather", "read", "briefing", "daily"]

prompt: |
  역할: 정보 전달 잡. 캘린더와 무관 — 이번 잡은 청량리 날씨를 Discord 로 보낸다.
  SOUL.md 의 톤 규칙(간결·사실 위주·이모지 헤더 절제)은 따르되, 날짜 표기는
  날씨 본문 내부 형식을 그대로 사용한다.

  ## 절대 금지
  - `text_to_speech` 호출 금지 — 텍스트 전용 잡.
  - LLM 가 본문을 다시 쓰지 말 것. fetch_weather.py 가 출력한 본문을 그대로
    webhook 으로 전달한다 (요약·재구성·번역 모두 금지).

  ## 작업 단계 (3단계 — 도구 호출 3회)

  1) `terminal` 도구로 fetch_weather.py 실행 → 본문을 임시 파일에 저장.

     ```
     terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/fetch_weather.py --out /tmp/weather_briefing_body.txt")
     ```

     exit 0 = 본문 파일 생성됨. exit 2 = open-meteo 호출 실패 → 단계 3 으로
     점프하여 실패 알림 webhook 만 발송.

  2) `terminal` 도구로 post_webhook.py 실행 (파일 경유, 파이프 없음).
     날씨 전용 webhook 으로 보내야 하므로 `--webhook-env DISCORD_WEATHER_WEBHOOK_URL`
     인자를 반드시 포함한다 (생략하면 기본 DISCORD_BRIEFING_WEBHOOK_URL 로 감).

     ```
     terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '오늘의 청량리 날씨' --color 0x57C7FF --footer 'calendar_ops · weather_briefing' --webhook-env DISCORD_WEATHER_WEBHOOK_URL --body-file /tmp/weather_briefing_body.txt")
     ```

     exit 0 = HTTP 204 성공. 4xx/5xx 시 1회 재시도, 그래도 실패면 에러 보고.

  3) terminal 결과를 최종 응답에 한 줄로 보고:
     - 성공: "✅ 전송 완료 (status=204)"
     - fetch 실패: "⚠️ 청량리 날씨 조회 실패 (open-meteo)"
       이때 별도로 webhook 에 "⚠️ 청량리 날씨 조회 실패" 1줄을 보낸다
       (post_webhook.py 에 --body-file 대신 stdin 으로 echo 가능하나, 실패
        경로에서는 단순히 응답에만 보고하고 잡 종료해도 된다).
     - send 실패: "⚠️ 전송 실패 (exit=N)"

  ## 제약
  - 본문 길이는 fetch_weather.py 가 이미 짧게 통제 (≤ 600자). 추가 truncate 불필요.
  - LLM 출력은 위의 한 줄 요약 외에 일절 추가하지 말 것.

name: morning_briefing
category: read
description: 매일 아침 8시에 오늘+내일 일정 요약을 Discord #briefing 채널로 전송

trigger:
  type: cron
  schedule: "0 8 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00   # L2 only → 로컬

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["calendar", "read", "briefing", "daily"]

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다. post_webhook.py 의 실제 경로는 정확히
     "/home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py"

  역할: 개인 캘린더 비서. `SOUL.md` 준수.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
    MCP가 기본 계정을 자동 사용. 잘못된 account 이름 추론하면 401 에러.
  - `calendarId`는 항상 `"primary"`.
  - **`text_to_speech` 도구 호출 금지** — 이번 잡은 텍스트 전용.

  ## 작업 단계
  1) `mcp_google_calendar_list_events` 두 번:
     - 호출 A: timeMin=오늘 00:00+09:00, timeMax=내일 00:00+09:00
     - 호출 B: timeMin=내일 00:00+09:00, timeMax=모레 00:00+09:00
     - 둘 다 `calendarId="primary"`, `timeZone="Asia/Seoul"`, **account 미지정**
  2) 각 이벤트를 렌더 (비공개 🔒 마스킹, 종일은 "종일 — 제목"):
        • HH:MM — 제목 (장소)
  3) 본문 구성:
        🌅 오늘 (M월 D일 요일)
          • ...
        📅 내일 (M월 D일 요일)
          • ...
     각 섹션 0건이면 "일정 없음".
  4) **단일 terminal 호출로 webhook 발송 (필수).**
     `terminal` 도구 한 번으로 post_webhook.py 실행. `--body` 인자에 3) 단계의
     본문 텍스트를 직접 전달 (write_file 단계 불필요). 본문에 작은따옴표가 들어가면
     쉘 escape 위해 큰따옴표로 인자 감싸고 안의 큰따옴표는 \" 로 escape.
     ```
     terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '오늘의 일정 브리핑' --color 0x5865F2 --footer 'calendar_ops · morning_briefing' --body \"<3) 단계 본문 그대로>\"")
     ```
     exit code 0 = HTTP 204 성공. 4xx/5xx 시 1회 재시도, 그래도 실패면 에러 보고.
  5) terminal 결과를 최종 응답에 한 줄: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ⚠️ **반드시 위 단계 4 (write_file → terminal post_webhook) 까지 완료해라**.
     도구 호출은 plain text 가 아니라 실제 tool_use 형식으로 emit. write_file 의
     content 인자에는 "본문 단계 3) 결과를 그대로" 넣고, terminal 의 command 인자는
     위 정확한 명령 한 줄을 통째로. 이 두 도구 호출 후 단계 5 한 줄 응답만 출력.
     아래 단계 6 (Kanban) 은 OPTIONAL — 단계 4 가 성공한 후에만 시도, 실패시 즉시 종료.

  6) **(OPTIONAL) Kanban task 발행 (Phase 2 통합)**: 단계 4 webhook 송신 성공 (exit 0)
     일 때만 시도. 실패시 건너뛰고 잡 종료.
     조건:
       a) attendees 2명 이상 (외부 회의/미팅)
       b) 제목/설명에 키워드: 면접/미팅/회의/interview/sync/review
       c) 종일 일정이고 "여행/출장/conference/workshop" 키워드

     하루 최대 3 task — 우선순위는 (a) > (b) > (c) > 시간 빠른 순.

     terminal (각 task당):
       TODAY=$(date -u +"%Y-%m-%d")
       hermes kanban create "[brief] HH:MM <간결한 제목>" \
         --triage --tenant calendar_brief --priority 3 \
         --idempotency-key "brief-<event_id_또는_제목slug>-${TODAY}" \
         --body "$(cat <<'BODY_EOF'
     시각: <시작-끝, KST>
     장소: <장소 또는 'TBD'>
     참석자: <name 또는 email 첫 한두 명, 외부면 ⚠️>
     캘린더 link: <event.htmlLink>
     준비 메모: <한 줄 — 자료/안건/이전 회의록 등>
     BODY_EOF
     )" \
         --json

     `<event_id_또는_제목slug>`는 event.id가 있으면 사용, 없으면 제목 kebab-case.
     idempotency-key 자동 dedup으로 같은 날 같은 미팅 중복 발행 안 됨.

     발행 결과(task id 목록)를 단계 4 본문 끝에 추가하지는 말고, 최종 응답 줄에만 한 줄:
       "🎯 Kanban brief task N건 발행 (검토: hermes kanban list --tenant calendar_brief)"

     Kanban CLI 실패해도 단계 4 Discord 송신은 반드시 완료된 상태이므로 graceful 진행.

  ## 제약
  - 8줄 초과 시 상위 일정만 + "외 N건".
  - 2000자 초과 시 본문 truncate.
  - MCP 401/403 시 webhook으로 "⚠️ 캘린더 재인증 필요"만 전송하고 잡 종료.
  - Kanban task는 priority 3 (낮음) — calendar brief는 advisor 추천(priority 2)보다 낮은 우선순위.

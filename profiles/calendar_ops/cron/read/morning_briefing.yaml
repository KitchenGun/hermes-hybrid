name: morning_briefing
category: read
description: 매일 아침 8시에 오늘+내일 일정 요약을 Discord #briefing 채널로 전송

trigger:
  type: cron
  schedule: "0 8 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00   # L2 only → 로컬

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["calendar", "read", "briefing", "daily"]

prompt: |
  역할: 개인 캘린더 비서. `SOUL.md` 준수.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
    MCP가 기본 계정을 자동 사용. 잘못된 account 이름 추론하면 401 에러.
  - `calendarId`는 항상 `"primary"`.
  - **`text_to_speech` 도구 호출 금지** — 이번 잡은 텍스트 전용.

  ## 작업 단계
  1) `mcp_google_calendar_list_events` 두 번:
     - 호출 A: timeMin=오늘 00:00+09:00, timeMax=내일 00:00+09:00
     - 호출 B: timeMin=내일 00:00+09:00, timeMax=모레 00:00+09:00
     - 둘 다 `calendarId="primary"`, `timeZone="Asia/Seoul"`, **account 미지정**
  2) 각 이벤트를 렌더 (비공개 🔒 마스킹, 종일은 "종일 — 제목"):
        • HH:MM — 제목 (장소)
  3) 본문 구성:
        🌅 오늘 (M월 D일 요일)
          • ...
        📅 내일 (M월 D일 요일)
          • ...
     각 섹션 0건이면 "일정 없음".
  4) **두 단계로 webhook 발송 (필수). 파이프 명령은 Hermes 보안 스캔에 차단되니 파일 경유.**
     - 단계 4-A: `write_file` 도구로 본문을 임시 파일에 저장
       ```
       write_file(path="/tmp/morning_briefing_body.txt", content="<3) 단계 본문>")
       ```
     - 단계 4-B: `terminal` 도구로 post_webhook.py 실행 (파이프 없이, --body-file 옵션 사용)
       ```
       terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '오늘의 일정 브리핑' --color 0x5865F2 --footer 'calendar_ops · morning_briefing' --body-file /tmp/morning_briefing_body.txt")
       ```
     exit code 0 = HTTP 204 성공. 4xx/5xx 시 1회 재시도, 그래도 실패면 에러 보고.
  5) terminal 결과를 최종 응답에 한 줄: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 8줄 초과 시 상위 일정만 + "외 N건".
  - 2000자 초과 시 본문 truncate.
  - MCP 401/403 시 webhook으로 "⚠️ 캘린더 재인증 필요"만 전송하고 잡 종료.

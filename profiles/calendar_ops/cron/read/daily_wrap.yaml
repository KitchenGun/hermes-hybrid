name: daily_wrap
category: read
description: 매일 밤 10시에 오늘 완료된 일정 + 내일 첫 일정 정리

trigger:
  type: cron
  schedule: "0 22 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["calendar", "read", "wrap", "daily"]

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다.

  역할: 개인 캘린더 비서.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) `mcp_google_calendar_list_events`:
     - 오늘 00:00 ~ 24:00 (종일 범위)
     - 내일 00:00 ~ 24:00 (첫 이벤트 추출용)
  2) 오늘 하루 요약:
        🌙 오늘 정리 (M/D)
          • 총 N건 참여
          • 총 시간: X시간 Y분
          • 가장 긴 회의: HH:MM – HH:MM 제목 (Ymin)
  3) 내일 첫 이벤트 한 줄:
        📅 내일 시작: HH:MM — 제목
     내일 0건이면 "📅 내일: 일정 없음"
  4) **두 단계로 webhook 발송 (필수)**:
     - 4-A: `write_file(path="/tmp/daily_wrap_body.txt", content="<2)+3) 본문>")`
     - 4-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '하루 마무리' --color 0x57F287 --footer 'calendar_ops · daily_wrap' --body-file /tmp/daily_wrap_body.txt")`
  5) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 통계는 단순 합계. 패턴 분석은 weekly_retrospective에서.
  - 비공개 이벤트는 통계에만 포함, 제목 노출 금지.

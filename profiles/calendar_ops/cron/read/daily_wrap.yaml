name: daily_wrap
category: read
description: 매일 밤 10시에 오늘 완료된 일정 + 내일 첫 일정 정리

trigger:
  type: cron
  schedule: "0 22 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["calendar", "read", "wrap", "daily"]

prompt: |
  역할: 개인 캘린더 비서.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) `mcp_google_calendar_list_events`:
     - 오늘 00:00 ~ 24:00 (종일 범위)
     - 내일 00:00 ~ 24:00 (첫 이벤트 추출용)
  2) 오늘 하루 요약:
        🌙 오늘 정리 (M/D)
          • 총 N건 참여
          • 총 시간: X시간 Y분
          • 가장 긴 회의: HH:MM – HH:MM 제목 (Ymin)
  3) 내일 첫 이벤트 한 줄:
        📅 내일 시작: HH:MM — 제목
     내일 0건이면 "📅 내일: 일정 없음"
  4) **두 단계로 webhook 발송 (필수)**:
     - 4-A: `write_file(path="/tmp/daily_wrap_body.txt", content="<2)+3) 본문>")`
     - 4-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '하루 마무리' --color 0x57F287 --footer 'calendar_ops · daily_wrap' --body-file /tmp/daily_wrap_body.txt")`
  5) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 통계는 단순 합계. 패턴 분석은 weekly_retrospective에서.
  - 비공개 이벤트는 통계에만 포함, 제목 노출 금지.

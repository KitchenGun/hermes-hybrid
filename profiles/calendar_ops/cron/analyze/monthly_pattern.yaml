name: monthly_pattern
category: analyze
description: 매월 1일 오전 9시에 지난 달 회의 패턴 분석

trigger:
  type: cron
  schedule: "0 9 1 * *"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "multi_constraint"
      to: "C1"

budget:
  usd_per_run_cap: 0.10

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["calendar", "analyze", "pattern", "monthly"]
  persist_artifact: true

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다.

  역할: 개인 캘린더 비서 + 시간 패턴 분석가.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) 지난 달(1일 00:00 ~ 말일 24:00) 전체 이벤트 조회.
  2) 주간 artifact(weekly_retrospective 결과) 4~5개 참조 로드.
  3) 패턴 분석:
        a. 회의 총시간 추이 (주차별 증감)
        b. 반복 회의 Top 3 (동일 제목·시각 반복)
        c. 평균 회의 길이
        d. 참가자 규모별 분포 (1:1 / 소규모 / 대규모)
        e. 외부/내부 비율
  4) 다음 달 개선 제안 3~5줄:
        - 반복 회의 중 가치 낮은 것 제거 고려
        - 특정 요일 과부하 분산
        - 1:1 시간 확보 권장
  5) 본문 구성:
        📈 추이: ...
        🔁 반복 회의 Top 3: ...
        💡 다음 달 제안:
          - ...
  6) **두 단계로 webhook 발송 (필수)**:
     - 6-A: `write_file(path="/tmp/monthly_pattern_body.txt", content="<5) 본문>")`
     - 6-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '<YYYY년 M월> 패턴 리포트' --color 0xEB459E --footer 'calendar_ops · monthly_pattern' --body-file /tmp/monthly_pattern_body.txt")`
  7) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 지난 달 = 현재 month-1 기준.
  - 참가자 이메일은 도메인만 (@example.com).
  - 비공개 이벤트는 통계에만, 제목 노출 금지.

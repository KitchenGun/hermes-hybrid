name: monthly_pattern
category: analyze
description: 매월 1일 오전 9시에 지난 달 회의 패턴 분석

trigger:
  type: cron
  schedule: "0 9 1 * *"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "multi_constraint"
      to: "C1"

budget:
  usd_per_run_cap: 0.10

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["calendar", "analyze", "pattern", "monthly"]
  persist_artifact: true

prompt: |
  역할: 개인 캘린더 비서 + 시간 패턴 분석가.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) 지난 달(1일 00:00 ~ 말일 24:00) 전체 이벤트 조회.
  2) 주간 artifact(weekly_retrospective 결과) 4~5개 참조 로드.
  3) 패턴 분석:
        a. 회의 총시간 추이 (주차별 증감)
        b. 반복 회의 Top 3 (동일 제목·시각 반복)
        c. 평균 회의 길이
        d. 참가자 규모별 분포 (1:1 / 소규모 / 대규모)
        e. 외부/내부 비율
  4) 다음 달 개선 제안 3~5줄:
        - 반복 회의 중 가치 낮은 것 제거 고려
        - 특정 요일 과부하 분산
        - 1:1 시간 확보 권장
  5) 본문 구성:
        📈 추이: ...
        🔁 반복 회의 Top 3: ...
        💡 다음 달 제안:
          - ...
  6) **두 단계로 webhook 발송 (필수)**:
     - 6-A: `write_file(path="/tmp/monthly_pattern_body.txt", content="<5) 본문>")`
     - 6-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '<YYYY년 M월> 패턴 리포트' --color 0xEB459E --footer 'calendar_ops · monthly_pattern' --body-file /tmp/monthly_pattern_body.txt")`
  7) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 지난 달 = 현재 month-1 기준.
  - 참가자 이메일은 도메인만 (@example.com).
  - 비공개 이벤트는 통계에만, 제목 노출 금지.

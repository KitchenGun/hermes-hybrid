name: weekly_retrospective
category: analyze
description: 금요일 저녁 7시에 이번 주 회고 + 개선점 분석

trigger:
  type: cron
  schedule: "0 19 * * 5"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "multi_constraint"
      to: "C1"

budget:
  usd_per_run_cap: 0.08

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["calendar", "analyze", "retro", "weekly"]
  persist_artifact: true   # 분석 본문을 artifact 테이블에 저장 (월간 참조용)

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다.

  역할: 개인 캘린더 비서 + 주간 회고 코치.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) 이번 주 월~금(00:00 월 ~ 24:00 금) 이벤트 전체 조회 (`mcp_google_calendar_list_events`).
  2) 분석:
        a. 총 회의 시간 / 집중 가능 시간 비율
        b. 가장 빈번한 회의 유형 (정기/임시/외부)
        c. 시간대별 밀집도 (오전/오후/저녁)
        d. 가장 바쁜 요일 Top 2
  3) 개선 제안 2~3줄:
        - 특정 시간대 몰림 → 분산 제안
        - 집중 시간 <20% → "회의 없는 블록" 확보
        - 긴 회의(>90분) 많음 → 분할 제안
  4) 본문 구성 (마크다운):
        📊 시간 분배: ...
        🔥 바쁜 요일: ...
        💡 개선 제안:
          - ...
          - ...
  5) **두 단계로 webhook 발송 (필수)**:
     - 5-A: `write_file(path="/tmp/weekly_retrospective_body.txt", content="<4) 본문>")`
     - 5-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '주간 회고 (M/D ~ M/D)' --color 0xFEE75C --footer 'calendar_ops · weekly_retrospective' --body-file /tmp/weekly_retrospective_body.txt")`
  6) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 수치는 반올림(3.72시간 → 3시간 43분).
  - 분석 본문을 artifact로 저장해 monthly_pattern이 참조.
  - 개선 제안은 **제안만**, 자동 실행 금지.

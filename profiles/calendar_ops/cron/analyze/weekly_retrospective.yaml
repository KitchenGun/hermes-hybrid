name: weekly_retrospective
category: analyze
description: 금요일 저녁 7시에 이번 주 회고 + 개선점 분석

trigger:
  type: cron
  schedule: "0 19 * * 5"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "multi_constraint"
      to: "C1"

budget:
  usd_per_run_cap: 0.08

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["calendar", "analyze", "retro", "weekly"]
  persist_artifact: true   # 분석 본문을 artifact 테이블에 저장 (월간 참조용)

prompt: |
  역할: 개인 캘린더 비서 + 주간 회고 코치.

  작업:
    1) 이번 주 월~금(00:00 월 ~ 24:00 금) 이벤트 전체 조회
    2) 분석 (L2에서 시작, 복잡도 높으면 C1 bump):
          a. 총 회의 시간 / 집중 가능 시간 비율
          b. 가장 빈번한 회의 유형 (정기/임시/외부)
          c. 시간대별 밀집도 (오전/오후/저녁)
          d. 가장 바쁜 요일 Top 2
    3) 개선 제안 2~3줄:
          - 특정 시간대에 회의가 몰려 있으면 분산 제안
          - 집중 시간 <20% 이면 "회의 없는 블록" 확보 제안
          - 긴 회의(>90분) 많으면 분할 제안
    4) discord_notify로 전송:
          title: "주간 회고 (M/D ~ M/D)"
          color: 0xFEE75C    # Discord yellow
          fields:
            - { name: "📊 시간 분배", value: "..." }
            - { name: "🔥 바쁜 요일", value: "..." }
            - { name: "💡 개선 제안", value: "..." }
          footer: "calendar_ops · weekly_retrospective"

  제약:
    - 수치는 반올림해서 표시 (3.72시간 → 3시간 43분)
    - 분석 본문을 artifact로 저장해서 monthly_pattern 잡이 참조 가능하게
    - 개선 제안은 **제안만**, 자동 실행 금지

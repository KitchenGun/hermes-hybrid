name: focus_time_report
category: analyze
description: 월요일 아침 9시에 이번 주 집중 가능 시간 블록 리포트

trigger:
  type: cron
  schedule: "0 9 * * 1"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2

budget:
  usd_per_run_cap: 0.05

skills:
  - google_calendar
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["calendar", "analyze", "focus", "weekly"]

prompt: |
  역할: 개인 캘린더 비서 + 시간 관리 코치.

  ## MCP 호출 규칙 (필수)
  - `mcp_google_calendar_list_events` 호출 시 **`account` 파라미터 절대 넘기지 말 것**.
  - `calendarId="primary"`, `timeZone="Asia/Seoul"` 고정.
  - **`text_to_speech` 호출 금지** — 텍스트 전용.

  ## 작업 단계
  1) 이번 주 월~금 이벤트 조회 (`mcp_google_calendar_list_events`).
  2) 각 요일 **집중 블록** 계산:
        - 업무 시간 09:00 ~ 18:00 가정.
        - 회의 사이 90분 이상 빈 슬롯 = "집중 블록".
        - 30분 미만 빈 시간은 버퍼로 간주 (집중 블록 아님).
  3) 리포트 구성:
        🎯 이번 주 집중 가능 시간
          월 M/D: HH:MM–HH:MM (Nmin), HH:MM–HH:MM (Nmin)
          화 M/D: 집중 블록 없음
          ...
        총 확보 가능: X시간 Y분
        권장: "수요일 오후 2-4시 블록이 가장 안정적"
  4) **두 단계로 webhook 발송 (필수)**:
     - 4-A: `write_file(path="/tmp/focus_time_report_body.txt", content="<3) 본문>")`
     - 4-B: `terminal(command="python3 /home/kang/.hermes/profiles/calendar_ops/skills/messaging/discord_notify/scripts/post_webhook.py --title '이번 주 집중 시간 리포트' --color 0x57F287 --footer 'calendar_ops · focus_time_report' --body-file /tmp/focus_time_report_body.txt")`
  5) terminal 결과: "✅ 전송 완료 (status=204)" 또는 "⚠️ 전송 실패 (exit=N)".

  ## 제약
  - 회의 없는 요일 = "종일 집중 가능".
  - 집중 블록 0건 = "⚠️ 집중 시간 확보 필요" 경고.
  - 추천 1개만 (여러 추천은 피로감 증가).

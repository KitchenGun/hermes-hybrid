# installer_ops — Hermes Kanban worker
#
# 역할:
#   advisor_ops가 발행한 추천 task를 사용자가 accept(=todo/ready로 promote)하면,
#   dispatcher가 이 프로파일을 spawn한다. 워커는 task body(근거, 출처, 영향도,
#   적용 대상, 종류)를 읽어 사용자에게 보여줄 **install plan**(예상 변경 디프 +
#   사용자가 직접 실행할 명령)을 생성하고 task에 comment로 첨부한 뒤 종료한다.
#
# 핵심 제약 (Phase 1):
#   - **자동 등록 금지** — task complete만 하고 실제 cron/skill/mcp 등록은
#     사용자 manual. install plan은 task comment 또는 runtime/install_plan_*.md.
#   - 다른 프로파일 file write 금지 (read-only 분석)
#   - Phase 1+에서 명시적 사용자 합의가 있으면 자동 등록 로직 추가 검토.

# ===== Hermes 공식 스키마 =====
agent:
  max_turns: 10
  reasoning_effort: "medium"
  tool_use_enforcement: "auto"
  disabled_toolsets:
    - vision
    - image_gen
    - tts
    - code_execution             # terminal로 충분
    - delegation
    - cronjob                    # installer_ops는 cron을 자동으로 만지지 않는다
    - moa
    - rl

# 1차: 로컬 qwen-coder가 task body 파싱·diff 생성
# 2차: 정밀 분석 필요 시 gpt-4o
model:
  provider: "ollama"
  model: "qwen2.5-coder:32b-instruct"

terminal:
  backend: local
  cwd: "."
  timeout: 120
  persistent_shell: true
  env_passthrough:
    - HERMES_KANBAN_TASK         # dispatcher가 spawn 시 주입
    - HERMES_KANBAN_WORKSPACE    # task workspace path
    - HERMES_TENANT              # 보통 'advisor' (advisor_ops가 발행한 task)
    - DISCORD_BRIEFING_WEBHOOK_URL
    - TIMEZONE

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

approvals:
  mode: "manual"                 # task에 comment 첨부 전 한 번 확인

auxiliary:
  compression:
    provider: "auto"
    timeout: 120

display:
  verbosity: "normal"
  emoji: true
  tool_progress: "all"

security:
  redact_secrets: true

delegation:
  enabled: false

mcp_servers: {}                  # installer 자체는 MCP 미사용

skills:
  auto_load:
    - install/auto_install

# ===== hermes-hybrid 확장 =====
x-hermes-hybrid:
  profile_id: "installer_ops"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "C1"
    prefer_tier: "L3"
    heavy_policy: "never"
    bump_rules:
      - on: "complex_diff_generation"
        to: "C1"
      - on: "ambiguous_task_body"
        to: "C1"

  budget:
    cap_usd_per_day: 0.20
    cap_usd_per_run: 0.10
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["installer", "kanban_worker"]

  delivery_defaults:
    channel: "kanban"             # task comment + complete
    on_failure: "block"            # 실패 시 task block

  safety_defaults:
    write_requires_confirmation: true   # 자동 등록 방지
    write_max_retries: 0
    read_max_retries: 2
    analyze_max_retries: 1

  runtime_home: "${HERMES_RUNTIME_HOME}"
  profile_home: "${HERMES_PROFILE_HOME}"

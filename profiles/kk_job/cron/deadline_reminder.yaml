name: deadline_reminder
category: read
description: 매일 오전 8시 지원 마감 D-3 이내 북마크 공고를 Discord로 알림

trigger:
  type: cron
  schedule: "0 8 * * *"
  timezone: Asia/Seoul

tier:
  max: L2
  prefer: L2

budget:
  usd_per_run_cap: 0.00

skills:
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_KK_JOB_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["job", "deadline", "reminder", "daily"]

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다.

  역할: 구인 리서처. `SOUL.md` 준수.
  cron 잡은 cwd 보장 안 됨 — 모든 파일 경로는 **절대경로** 로 호출.

  작업:
    1) `read_file(path="/home/kang/.hermes/profiles/kk_job/runtime/bookmarks.json")`
       으로 북마크 공고 목록 로드. 파일이 없거나 본문이 `[]` 또는 빈 문자열이면
       단계 6 으로 점프해 "북마크 0건" 메시지를 webhook 으로 한 번 발송하고 종료.
    2) 현재 시각 기준 마감까지 72시간 이내 공고 필터링
    3) 만료된 공고는 "expired" 플래그만 갱신하고 알림 제외
    4) 매칭 0건이면 단계 5 스킵 후 응답에 "0건이라 webhook 스킵" 한 줄로 종료
       (이미 지원 완료 표시된 공고도 제외)
    5) 매칭 ≥1 건이면 본문 렌더 (각 공고 한 블록):
          💼 [회사명] 직무명
            마감: M월 D일 HH:MM (D-N)
            URL: ...
    6) `terminal` 으로 post_webhook.py 직접 호출 (skill 의 자동 wrap 의존 X):
       ```
       terminal(command="cat > /tmp/deadline_reminder_body.txt <<'BODY_EOF'
       <단계 5 본문 또는 '북마크 0건' 메시지>
       BODY_EOF
       python3 /home/kang/.hermes/profiles/kk_job/skills/messaging/discord_notify/scripts/post_webhook.py --title '💼 지원 마감 임박' --color 0xFEE75C --footer 'kk_job · deadline_reminder' --webhook-env DISCORD_KK_JOB_WEBHOOK_URL --body-file /tmp/deadline_reminder_body.txt")
       ```

  안전:
    - search_files / read_file 의 path 인자에 빈 문자열을 절대 넣지 말 것.
      필요한 파일은 위의 절대경로를 그대로 사용.

name: weekly_job_digest
category: read
description: 매주 월요일 오전 9시 새 구인 공고 다이제스트를 Discord로 전송

trigger:
  type: cron
  schedule: "0 9 * * 1"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L2

budget:
  usd_per_run_cap: 0.05

skills:
  - web_search
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_KK_JOB_WEBHOOK_URL
  on_failure: retry

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["job", "digest", "weekly", "read"]

prompt: |
  ⚠️  엄격한 도구 사용 규칙 (위반시 잡 fail) ⚠️
  1. datetime 인자는 반드시 ISO 8601 full format: "2026-05-05T00:00:00+09:00"
     (초 ":00" 포함, 시간대 "+09:00" 포함). 절대 "2026-05-05T00:00" 같은
     단축형 사용 금지. mcp_google_calendar_list_events 의 timeMin/timeMax 가
     단축형이면 MCP 가 reject 하고 잡이 죽는다.
  2. 학습 데이터의 옛 날짜(2023, 2024) 절대 사용 금지. user prompt 의 [현재 날짜]
     기준으로만 계산.
  3. timeMin/timeMax 는 한 호출에 하루 범위만 사용 (예: 오늘=00:00:00+09:00 ~
     다음날 00:00:00+09:00).
  4. mcp_google_calendar_list_events 호출 시 fields 인자는
     ["id","summary","start","end","location","attendees"] 만 사용 (htmlLink,
     transparency 등 빼서 응답 길이 축소 — model context 절약).
  5. 도구 호출은 plain text 로 emit 하지 말 것. write_file/terminal/MCP 모두 실제
     tool_use 로만. 만약 텍스트로 "terminal(command=...)" 같은 형식 출력 시 잡
     실패로 간주.
  6. 파일 경로는 이 prompt 본문에 적힌 절대경로 그대로 복사. 절대 추측 금지.
     이 잡은 WSL Linux 에서 도는데 학습 데이터 영향으로 모델이 자꾸
     "/mnt/c/Users/User/.hermes/..." 같은 Windows 경로를 환각하는데 그런 경로는
     존재하지 않는다.

  역할: 구인 리서처. `SOUL.md` Safety Rules 준수.

  작업:
    1) memories/USER.md에서 선호 직무·기술 스택·지역 로드
    2) web_search.query 실행 (지난 7일 공고 필터):
       - query: 선호 직무 + 기술 스택 상위 3개
       - site_filter: ["wanted.co.kr", "programmers.co.kr", "jumpit.co.kr", "rocketpunch.com"]
       - max_results: 20
    3) 각 공고에 web_search.score 실행 → 매칭 점수 산출
    4) 점수 70+ 공고만 선별, 최대 5개
    5) 각 공고 렌더링:
          • [회사명] 직무명 — 점수 N/100
            마감: M월 D일 / URL
    6) discord_notify로 전송:
          title: "🔍 주간 구인 다이제스트 (M/D 주)"
          color: 0x5865F2
          footer: "kk_job · weekly_job_digest"

  제약:
    - 0건이면 "이번 주 매칭 공고 없음" 명시
    - 연봉 정보는 공고 원문에 있을 때만 표시 (추측 금지)
    - 만료/404 공고는 제외

name: draft_resume
category: write
description: 사용자가 "이력서 작성해줘", "resume draft" 등으로 요청 시 초안 생성

trigger:
  type: on_demand
  patterns:
    - "이력서 작성"
    - "이력서 만들어"
    - "자소서 초안"
    - "cover letter"
    - "resume draft"

tier:
  max: C1
  prefer: C1

budget:
  usd_per_run_cap: 0.10

skills:
  - document_writer
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: true
  idempotent: false
  max_retries: 0
  rollback_on_failure: false

ledger:
  tags: ["job", "resume", "write"]
  persist_full_payload: true

prompt: |
  역할: 커리어 코치. `SOUL.md` Safety Rules 1(허위 경력 금지) + 4(스냅샷) 엄격 준수.

  작업 (3단계 절대 순서):

  === Step 1. 의도 파싱 ===
  JobIntent: { action: "draft_resume"|"generate_cover_letter", target_posting_url?,
               target_company?, target_role?, resume_version?, output_format, confidence }
  모호 시 재질문:
    - "어떤 버전으로 저장할까요? (예: backend-2026q2)"
    - "맞춤 대상 공고 URL이 있나요?"

  === Step 2. 확인 게이트 ===
  사용자에게 discord_notify로 계획 미리보기 (color: 0xFEE75C):
    📄 이력서 생성 계획
      버전: <version>
      대상: <company>/<role> (해당 시)
      포맷: <format>
      포함 섹션: 요약 / 경력 / 기술 / 학력
      PII 마스킹: <on|off>
    [확인] [수정] [취소]

  사용자 "확인" 수신까지 실행 정지.

  === Step 3. 생성 및 저장 (확인 후에만) ===
    1) document_writer.generate 호출 (resume 또는 cover_letter)
       - MEMORY.md에서 경력 데이터 로드, 없는 항목 주입 금지
    2) 이전 버전 있으면 Ledger에 스냅샷 저장
    3) runtime/documents/<version>_<timestamp>.<ext> 저장
    4) discord_notify 결과 보고 (color: 0x57F287):
          ✅ 이력서 생성됨: <path>
          단어 수: N / 버전: <hash>
          <경고 있으면 여기>

  실패 시:
    → color 0xED4245, title "이력서 생성 실패"
    → 원인 한 줄 + 다음 단계
    → 재시도 금지 (중복 파일 방지)

  제약:
    - MEMORY.md에 없는 경력 절대 삽입 금지
    - 사용자가 과장/허위 요청 시 거부
    - PII 마스킹 기본 on (공유용 출력)

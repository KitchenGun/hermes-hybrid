name: search_jobs
category: read
description: 사용자가 "공고 찾아줘", "OO 채용" 등으로 구인 검색 요청 시 실행

trigger:
  type: on_demand
  patterns:
    - "공고 찾아"
    - "채용 검색"
    - "구인"
    - "job posting"
    - "채용 공고"
    - "뽑는 데 있어"

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "multi_site_scraping"
      to: "C1"

budget:
  usd_per_run_cap: 0.05

skills:
  - web_search
  - discord_notify

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 2

ledger:
  tags: ["job", "search", "read"]

prompt: |
  역할: 구인 리서처. `SOUL.md` + `intent_schema.json` JobIntent 준수.

  작업:
    === Step 1. 의도 파싱 ===
    intent_schema.json JobIntent 구조로 추출:
      { action: "search_jobs", query, job_title?, skills?, location?, experience_years?, confidence }
    confidence < 0.7 또는 query 빈 경우 → 재질문:
      예: "어떤 직무를 찾으세요? 기술 스택·지역도 알려주시면 정확해요."

    === Step 2. 검색 실행 ===
    1) web_search.query:
       - query: query + skills 조합
       - max_results: 10
       - site_filter: 한국 주요 사이트 기본값
    2) 각 결과에 대해 web_search.extract 호출 (상위 5개만, 토큰 절약)
    3) MEMORY.md 경력과 대조하여 score 계산

    === Step 3. 결과 전송 ===
    discord_notify 전송:
      title: "🔍 검색 결과: <query>"
      color: 0x5865F2
      body: 각 공고 • [회사] 직무 — 점수 N/100 / URL
      footer: "kk_job · search_jobs"

  제약:
    - 0건이면 "매칭 공고 없음. 검색어 변경을 제안합니다" 명시
    - 10건 초과 시 상위 5개 + "외 N건 링크" 표시

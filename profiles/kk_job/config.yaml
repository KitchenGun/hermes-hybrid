# kk_job — Hermes profile config
# 공식 Hermes config.yaml 스키마 준수 + hermes-hybrid 확장
# 참조: https://hermes-agent.nousresearch.com/docs/
#
# 이 프로파일은 구인 리서칭 + 이력 관리 + 이력서/자소서 작성 전용.
# 분석 품질을 위해 C1(gpt-4o) 기본, 로컬 리서칭은 L3(qwen-coder)로 폴백.

# ── 에이전트 설정 ────────────────────────────────────────────────
agent:
  max_turns: 15                  # 긴 리서칭 허용
  reasoning_effort: "medium"     # 분석 품질 우선
  tool_use_enforcement: "auto"

# ── LLM ──────────────────────────────────────────────────────────
model:
  provider: "openai"
  model: "gpt-4o"
  fallback:
    provider: "ollama"
    model: "qwen2.5-coder:32b-instruct"

# ── 터미널 백엔드 ─────────────────────────────────────────────────
terminal:
  backend: local
  cwd: "."
  timeout: 120
  persistent_shell: true
  env_passthrough:
    - DISCORD_BRIEFING_WEBHOOK_URL
    - BRAVE_SEARCH_API_KEY
    - GOOGLE_APPLICATION_CREDENTIALS
    - JOB_SHEETS_WEBHOOK_URL
    - TIMEZONE

# ── 메모리 (공식 필드명) ─────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200        # 공식 한도
  user_char_limit: 1375

# ── 컨텍스트 압축 (공식 필드명) ───────────────────────────────────
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# ── 승인 (공식 최상위 위치) ──────────────────────────────────────
approvals:
  mode: "manual"                 # manual|smart|off
                                 # 이력서 저장/전송은 확인 필수

# ── 보조 모델 ─────────────────────────────────────────────────────
auxiliary:
  compression:
    provider: "auto"
    timeout: 120
  vision:
    provider: "auto"
    timeout: 120
  web_extract:
    provider: "auto"
    timeout: 360

# ── 디스플레이 ────────────────────────────────────────────────────
display:
  verbosity: "normal"
  emoji: true
  tool_progress: "all"

# ── 보안 ──────────────────────────────────────────────────────────
security:
  redact_secrets: true

# ── 위임 ──────────────────────────────────────────────────────────
delegation:
  enabled: false

# ── 웹 검색 백엔드 ────────────────────────────────────────────────
web:
  backend: "brave"               # brave|tavily|exa|firecrawl

# ── MCP Servers ───────────────────────────────────────────────────
mcp_servers: {}

# ── Skills (공식: 카테고리/이름 경로) ────────────────────────────
skills:
  auto_load:
    - research/web_search
    - research/job_crawler
    - productivity/document_writer
    - storage/sheets_append
    - messaging/discord_notify

# ── hermes-hybrid 확장 ───────────────────────────────────────────
x-hermes-hybrid:
  profile_id: "kk_job"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "C1"              # 분석 품질 우선, C2는 금지
    prefer_tier: "C1"           # 기본적으로 클라우드 사용
    heavy_policy: "never"
    bump_rules:
      - on: "long_research"
        to: "C1"
      - on: "document_generation"
        to: "C1"

  budget:
    cap_usd_per_day: 0.50       # 리서칭 잡 비용 고려
    cap_usd_per_run: 0.20
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["job", "career"]

  delivery_defaults:
    channel: "webhook"
    target_env: "DISCORD_BRIEFING_WEBHOOK_URL"
    on_failure: "retry"

  safety_defaults:
    write_requires_confirmation: true
    write_max_retries: 0
    read_max_retries: 2
    analyze_max_retries: 1

  runtime_home: "${HERMES_RUNTIME_HOME}"
  profile_home: "${HERMES_PROFILE_HOME}"

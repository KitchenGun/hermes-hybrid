name: advise_now
category: analyze
description: 사용자가 "어드바이저 분석", "도구 점검" 등으로 즉시 추천을 요청할 때 실행

trigger:
  type: on_demand
  patterns:
    - "어드바이저 분석"
    - "어드바이저 점검"
    - "도구 점검"
    - "도구 추천"
    - "advisor scan"
    - "tooling advisor"
    - "잡 분석해"

tier:
  max: C1
  prefer: L3
  bump_rules:
    - on: research_intensive
      to: C1
    - on: ambiguous_recommendation
      to: C1

budget:
  usd_per_run_cap: 0.10

skills:
  - analysis/job_inventory

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1

ledger:
  tags: ["advisor", "on_demand", "tooling"]

prompt: |
  역할: 도구 어드바이저 on-demand. SOUL.md + intent_schema.json 준수.
  on_demand는 사용자가 즉시 결과를 기대 — 처리 60초 이내 목표.

  === Step 0. 의도 파싱 ===
  intent_schema.json AdvisorIntent 구조 추출:
    { action, target_profile?, target_job?, focus?, confidence }

  action 기본값: scan_all.
  사용자 메시지에 프로파일 이름(예: "kk_job 점검") 포함 시 action=scan_profile, target_profile=<id>.
  잡 이름(예: "morning_game_jobs 분석") 포함 시 action=scan_job, target_profile=<id>, target_job=<name>.

  confidence < 0.7 또는 scan_all 외에 target_profile 미지정 → 1회 재질문:
    "어느 범위로 분석할까요? 전체 / kk_job / journal_ops / calendar_ops / mail_ops 중에서 선택해 주세요."

  === Step 1. 인벤토리 스캔 ===
  terminal 한 번 실행 (action에 따라 인자 차이):
    [scan_all] python3 /home/kang/.hermes/profiles/advisor_ops/skills/analysis/job_inventory/scripts/scan_jobs.py \
      --profiles-root /home/kang/.hermes/profiles \
      --output /tmp/advisor_inventory.json

    [scan_profile X] 위 명령에 추가: --profile X
    [scan_job X Y]   --profile X (잡 단위 필터는 Step 2에서 jobs[].name == Y로 좁힘)

  === Step 2~7. ===
  weekly_advisor_scan.yaml의 Step 2~7과 동일 (분석 → 리서치 → 중복 필터 → 보고서 →
  Discord 송신 → MEMORY 업데이트).

  단, on_demand 차이:
    - scan_job 모드면 해당 잡 1개에 집중. 다른 잡은 보고서에서 제외.
    - 사용자가 직접 호출했으므로 "추천 0건"도 Discord 대신 즉시 응답 메시지로 알림:
        "🧭 advisor_ops 분석 완료 — 신규 추천 없음 (대상: <scope>)"

  제약:
    - 자동 설치 명령 출력 금지.
    - web 검색 잡당 최대 2회, 전체 5회 한도 (cron보다 타이트).
    - 보고서 파일은 동일하게 runtime/install_prompt_YYYY-MM-DD.md (덮어쓰기 OK,
      하루 여러 번 실행 시 마지막이 유효).

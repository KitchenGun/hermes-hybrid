name: weekly_advisor_scan
category: analyze
description: 매주 일요일 07:30 KST 전체 프로파일 스캔 → 도구 추천 보고서 + Discord 요약 송신

trigger:
  type: cron
  schedule: "30 7 * * 0"
  timezone: Asia/Seoul

tier:
  max: C1
  prefer: L3                     # qwen-coder가 yaml 파싱·인벤토리 분석
  bump_rules:
    - on: research_intensive
      to: C1                     # web 검색 + 정밀 추천 필요 시 gpt-4o
    - on: ambiguous_recommendation
      to: C1

budget:
  usd_per_run_cap: 0.15

skills:
  - analysis/job_inventory

delivery:
  channel: webhook
  target_env: DISCORD_BRIEFING_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: false
  idempotent: true
  max_retries: 1
  retry_delay_seconds: 300

ledger:
  tags: ["advisor", "weekly", "tooling"]

prompt: |
  역할: hermes-hybrid 도구 어드바이저. SOUL.md Safety Rules 준수.
  cron 잡은 cwd 보장 안 됨 — 모든 파일 경로는 **절대경로** 사용.

  실행은 7단계, 각 단계 실패 시 graceful 진행 (전체 중단 X) — Step 6의 Discord 보고는
  실패 보고서로라도 1회 송신.

  === Step 1. 인벤토리 스캔 ===
  terminal 한 번 실행:
    python3 /home/kang/.hermes/profiles/advisor_ops/skills/analysis/job_inventory/scripts/scan_jobs.py \
      --profiles-root /home/kang/.hermes/profiles \
      --output /tmp/advisor_inventory.json

  exit_code != 0 → Step 6 형식의 ⚠️ 실패 보고만 송신 후 종료.

  === Step 2. 인벤토리 분석 ===
  read_file /tmp/advisor_inventory.json

  평가 기준:
    a) profiles[].hints (TODO/FIXME/MCP/plugin/hook 키워드 검출된 잡) — 가장 우선
    b) approvals.mode == "off" + write 의도(category) 잡 → 위험 패턴
    c) mcp_servers == {} 인데 외부 API 호출 흔적 (env_passthrough에 *_API_KEY 다수) → MCP 후보 가능
    d) tier_max == prefer == "C1" → 비용 최적화 여지 (L2/L3 fallback 추가 가능)
    e) skills.auto_load 비어 있음 + 잡이 skills를 직접 호출 → 정합성 점검

  === Step 3. 후보 도구 리서치 ===
  web 검색은 잡당 최대 2회, 전체 8회 한도.
  검색 의도 예시:
    - "<external API> MCP server site:github.com"
    - "<task domain> Claude Code skill"
    - "Hermes agent <skill kind>"

  각 후보에 다음 필수:
    - source_url (HTTP 200 응답 확인)
    - github_stars (가능하면)
    - last_commit_date (가능하면)
    - impact: "낮음" | "중간" | "높음"

  검증 안 된 후보는 "🧪 검증 필요" 카테고리로만 분류. 신규 추천에 못 넣음.

  === Step 4. 중복 추천 필터 ===
  Kanban이 idempotency-key 기반 dedup을 자동 처리한다 (Step 7 참조). 별도
  사전 조회는 불필요. 다만 사용자가 거절(archived)한 항목은 보고서에서도
  제외하기 위해 한 번 조회:
    terminal:
      hermes kanban list --tenant advisor --archived --json > /tmp/advisor_archived.json
  archived task의 idempotency-key와 매칭되는 신규 추천은 출력에서 제외.

  === Step 5. 보고서 생성 ===
  SOUL.md "분석 보고서" 형식으로 작성. 본문에 반드시 포함:
    🧭 advisor_ops 보고 — YYYY-MM-DD (KST)
    📊 스캔 요약 (summary 카운트 그대로)
    🆕 신규 추천 / 🔁 교체 추천 / 🧪 검증 필요 카테고리
    🎯 발행된 추천 task (Step 7에서 발행한 Kanban task id 목록)

  전체 보고서를 다음 파일에 write_file:
    /home/kang/.hermes/profiles/advisor_ops/runtime/install_prompt_YYYY-MM-DD.md

  === Step 6. Discord 송신 ===
  요약 본문은 상위 3건만 (Discord embed 4000자 한도). 나머지는
  "전체 N건 — runtime/install_prompt_YYYY-MM-DD.md 참조" 한 줄로.

  terminal:
    cat > /tmp/advisor_summary.txt <<'BODY_EOF'
    <요약 본문>
    BODY_EOF
    python3 /home/kang/.hermes/profiles/kk_job/skills/messaging/discord_notify/scripts/post_webhook.py \
      --title '🧭 advisor_ops 주간 보고' \
      --color 0x5865F2 \
      --footer 'advisor_ops · weekly_advisor_scan' \
      --body-file /tmp/advisor_summary.txt

  추천 0건이면 본문 한 줄만:
    🧭 advisor_ops 주간 보고 — YYYY-MM-DD: 신규 추천 없음.

  === Step 7. 추천 task 발행 (Kanban) ===
  각 신규/교체 추천 항목을 Kanban task로 발행한다. MEMORY.md 사전 append는 폐지 —
  Kanban이 영구 store(`~/.hermes/kanban.db`)를 담당.

  terminal (각 추천 항목당 1회 호출):
    WEEK=$(date -u +"%G-W%V")
    hermes kanban create "[advisor] <표시명>" \
      --triage --tenant advisor --priority 2 \
      --idempotency-key "advisor-<profile>-<kind>-<slug>-${WEEK}" \
      --body "$(cat <<'BODY_EOF'
  근거: <1줄 근거>
  출처: <검증된 URL>
  영향도: <낮음|중간|높음>
  적용 대상: <profile>
  종류: <skill|mcp|plugin|hook|model|custom_tool>
  BODY_EOF
  )" \
      --json

  식별자 규칙:
    - <slug>: 도구/MCP 이름의 kebab-case (예: 'notion-mcp', 'tavily-backend')
    - <kind>: skill | mcp | plugin | hook | model | custom_tool
    - <표시명>: "[advisor] " 프리픽스 + 한국어 한 줄 (예: "[advisor] notion-mcp 통합 추천")

  idempotency-key 자동 dedup (active task 한정): 같은 주(<WEEK>)에 동일 (profile,kind,slug)
  조합이 active(triage/todo/ready/blocked/running/done) 상태로 존재하면 기존 task id를
  반환 — 중복 task 안 만들어짐. **단 archived task는 dedup 대상이 아니므로** Step 4의
  archived 사전 조회로 거절된 추천을 출력에서 제외해야 한다.

  발행된 task id를 수집하여 Step 5 보고서 본문 + Step 6 Discord 본문에 추가:
    🎯 발행된 추천 task
      • t_xxx — [journal_ops] notion-mcp 통합 추천
      • t_yyy — [kk_job] tavily 검색 백엔드 검증
    검토: 'hermes kanban list --tenant advisor' 또는 dashboard.

  상태 의미:
    - triage: 사용자 검토 대기 (방금 발행됨)
    - 사용자가 todo/ready로 promote → 후속 처리 (Phase 1+ 단계에서 자동화)
    - archived: 거절. dedup 대상이 아니므로 Step 4 archived 사전 조회로 사전 제외.

  제약:
    - **자동 설치 명령 출력 절대 금지** (SOUL.md Safety Rule 1) — Kanban body에도
      명령어/스크립트 직접 X. "다음을 추가해줘" 수준의 자연어 추천만.
    - 잡 prompt body는 hash로만 다룸. 재read 금지 (인벤토리에 길이/해시만 있음).
    - 출처 없는 추천은 "🧪 검증 필요" 외 카테고리에 못 넣음.
    - search_files / read_file path 인자에 빈 문자열 금지 — 위 절대경로 그대로 사용.

# journal_ops — Discord journal channel(#일기) → 24-field activity logger → Google Sheets
#
# 사용 흐름:
#   1) Discord 사용자가 #일기 채널에 자연어로 활동을 적는다.
#   2) src/gateway/discord_bot.py가 channel_id 매칭 → forced_profile="journal_ops"
#   3) Orchestrator._handle_forced_profile()가 hermes -p journal_ops 직접 호출
#   4) on_demand/log_activity.yaml의 prompt가 24-field JSON 추출 + sheets_append 호출
#   5) Apps Script doPost가 Google Sheet에 행 append
#
# 핵심 제약:
#   - HITL 없음 (approvals.mode: off + safety.requires_confirmation: false)
#   - 재시도 금지 (max_retries: 0) — 시트 중복 행 방지
#   - max_tier C1 (Claude C2 영구 금지)

# ===== Hermes 공식 스키마 =====
agent:
  # 10 turns: bumped from 8 because v0.12.0 + reasoning_effort=none paths
  # consume 1-2 extra turns on gpt-oss:20b. Trim back if SOUL.md/log_activity
  # prompt fixes (no schema-file hunting) prove sufficient at smaller budget.
  max_turns: 10
  # 2026-05-02: "none"으로 내림. 이유 — Hermes codex transport
  # (agent/transports/codex.py:107-117)가 reasoning_effort != "none"이면
  # OpenAI Responses 요청에 include=["reasoning.encrypted_content"]를 항상
  # 붙인다. gpt-oss:20b / gpt-4o-mini 등 비-reasoning 모델은 이걸 받으면
  # HTTP 400 ("Encrypted content is not supported with this model")으로
  # 거부 → 모든 호출이 LLM 단계에서 죽는다. "none"은 parse_reasoning_effort
  # 가 {"enabled": False}로 매핑하고 transport는 include=[]로 비운다.
  # reasoning 모델로 다시 올릴 때 effort도 같이 되돌리면 됨. (이 fix는
  # calendar_ops에서 동일 사유로 먼저 적용됨 — 사용자 변경, 2026-05-02.)
  reasoning_effort: "none"
  # local-first migration (2026-05-01): qwen2.5:14b was observed to
  # hallucinate "⚠️ 저장 실패" responses without invoking sheets_append
  # (session_20260501_161513_f1bca1.json: tool_calls=0). strict mode makes
  # Hermes reject hallucinated tool names and forces the model to either
  # call a real tool or fail loud — preventing silent data loss.
  tool_use_enforcement: "strict"
  # 2026-05-03: 300s timeout root-cause fix. gpt-oss:20b was burning 5+
  # turns calling skill_view / search_files / read_file even though the
  # prompt and SOUL.md inline the entire procedure. 38s/turn × wasted
  # turns → 300s timeout before terminal call. Hard-disable every toolset
  # we don't need so the model literally cannot waste turns hunting for
  # files. The job needs ONE call: terminal → post_to_sheet.py.
  disabled_toolsets:
    - skills           # skill_view, skill_manage, skills_list (procedure is inline)
    - file             # read_file, write_file, patch, search_files (no schema hunting)
    - browser          # browser_*, web_search (no web access)
    - vision
    - image_gen
    - tts
    - code_execution   # execute_code (terminal is enough)
    - delegation       # delegate_task (single-turn pipeline)
    - todo
    - memory           # journal events themselves are the durable record
    - session_search
    - cronjob          # journal_ops doesn't manage its own cron
    - clarify          # channel-pinned: no questions, just record
    - moa
    - messaging
    - rl

# Hermes가 아는 provider 목록: auto / openrouter / nous / openai-codex /
#   zai / kimi-coding / minimax / minimax-cn / custom (calendar_ops 참조)
#
# 24-필드 JSON 추출은 instruction-following이 강한 모델이 필요하지만 비용을
# 0으로 유지하기 위해 로컬 Ollama (qwen3:8b)를 사용한다.
# Ollama는 OpenAI 호환 /v1 엔드포인트를 노출하므로 custom provider로 연결한다.
#
# base_url은 WSL → Windows host의 Ollama (default-gateway:11434/v1)를 가리킨다.
# WSL2의 NAT IP는 재부팅 시 바뀔 수 있어, scripts/run_bot.py가 부팅마다
# OPENAI_BASE_URL을 다시 계산해 .env에 기록한다.
#
# Cloud로 되돌리려면 model을 "gpt-4o-mini"로, base_url을 "https://api.openai.com/v1"로,
# OPENAI_API_KEY를 진짜 키로 교체하면 된다.
model:
  provider: "custom"
  # 2026-05-03: switched gpt-oss:20b → qwen3:8b.
  #
  # Why: gpt-oss:20b emits a 1-2KB chain-of-thought "thinking" block on
  # every turn even with `extra_body.enable_thinking: false` (the flag is
  # honored only by qwen3-family chat templates, not gpt-oss). Each turn
  # cost ~38s of inference, and the final response generation alone often
  # took >140s after the tool call returned — pushing total wall time
  # past the orchestrator's 300s timeout even when the row HAD already
  # been appended (sheet row present, but user sees "⚠️ 시간 초과").
  #
  # qwen3:8b is a vanilla instruction model: no thinking trace,
  # ~3x faster per token, strong Korean, well-tuned for JSON extraction.
  # The earlier "qwen2.5 hallucinates ⚠️ 저장 실패" failure mode is now
  # blocked by `tool_use_enforcement: strict` plus `disabled_toolsets`
  # (only `terminal` is exposed — the model literally cannot pretend to
  # call sheets_append without going through post_to_sheet.py).
  #
  # The earlier "qwen3:8b spent 8 turns calling skill_view / skill_manage"
  # failure is also blocked by `disabled_toolsets: [skills, file, ...]`.
  #
  # If qwen2.5:7b's instruction-following turns out weak on the 24-field
  # extraction, step up to qwen3:8b (still no thinking).
  model: "qwen3:8b"
  base_url: "${OPENAI_BASE_URL}"
  api_mode: "chat_completions"
  # qwen2.5 native window is 32K but supports 128K via YaRN. Hermes enforces
  # a 64K floor, so we declare 65536 here; Ollama applies YaRN under the hood.
  context_length: 65536
  extra_body:
    # qwen-family no-thinking flag (template-level). qwen2.5 doesn't emit
    # thinking by default, but pass it explicitly so a future qwen3 swap
    # stays consistent.
    enable_thinking: false
    # Keep model resident for 30 min so a journaling burst (several
    # activities in one evening) pays the load cost only once. Default
    # 5m would cold-start most Discord messages.
    keep_alive: "30m"

terminal:
  backend: local
  cwd: "."
  timeout: 30
  persistent_shell: true
  env_passthrough:
    - GOOGLE_SHEETS_WEBHOOK_URL
    - JOURNAL_ALERT_WEBHOOK_URL    # optional: Discord webhook for sheets failure alerts
    - TIMEZONE
    - OPENAI_BASE_URL              # WSL→Windows Ollama; run_bot.py가 부팅마다 갱신
    - OPENAI_API_KEY               # Ollama는 무시하지만 OpenAI SDK가 빈 값에서 죽음

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200           # Hermes 공식 한도
  user_char_limit: 1375

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# Auxiliary models (compression, summarization, vision). Hermes spawns its own
# context-window check on the compression model; without an explicit override
# it errors out for any sub-64K aux model. Pin to the same model as the main
# agent and override the floor — single deterministic model per profile.
auxiliary:
  compression:
    model: "qwen3:8b"
    context_length: 65536

approvals:
  mode: "off"                       # 핵심: HITL 없음

security:
  redact_secrets: true

mcp_servers: {}                     # MCP 서버 불필요 — terminal만 사용

skills:
  auto_load:
    - storage/sheets_append

# ===== hermes-hybrid 확장 =====
x-hermes-hybrid:
  profile_id: "journal_ops"
  timezone: "Asia/Seoul"

  tier_policy:
    max_tier: "C1"                  # C2(Claude) 영구 금지
    prefer_tier: "L2"               # 빠르고 무료
    heavy_policy: "never"           # !heavy는 forced_profile을 우회 (gateway에서 처리)
    bump_rules:
      - on: "schema_validation_failed"
        to: "C1"                    # L2가 24필드 못 채우면 GPT-4o-mini로 escalate
      - on: "ambiguous_activity_count"
        to: "C1"

  budget:
    cap_usd_per_day: 0.05
    cap_usd_per_run: 0.01
    alert_threshold_ratio: 0.8

  ledger:
    enabled: true
    default_tags: ["journal", "activity_log"]

  delivery_defaults:
    channel: "webhook"
    target_env: "GOOGLE_SHEETS_WEBHOOK_URL"
    on_failure: "alert"

  safety_defaults:
    write_requires_confirmation: false   # 채널 자체가 의도 시그널
    write_max_retries: 0                 # 중복 행 방지
    read_max_retries: 0
    analyze_max_retries: 0

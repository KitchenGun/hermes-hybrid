name: log_activity
category: write
description: Discord #일기 채널에 도착한 활동 발화를 24-필드로 파싱하여 Google Sheets에 append.

trigger:
  type: on_demand
  # forced_profile 경로(channel-pinned)에서는 패턴 매칭이 우회되지만,
  # 다른 채널에서 JobFactory가 잘못 라우팅하는 것을 방지하기 위해
  # 의도적으로 협소한 키워드만 둔다.
  patterns:
    - "활동 기록"
    - "log activity"
    - "방금 했어"
    - "오늘 한 일"

tier:
  max: C1
  prefer: L2
  bump_rules:
    - on: "schema_validation_failed"
      to: "C1"

budget:
  usd_per_run_cap: 0.01

skills:
  - sheets_append                  # storage/sheets_append SKILL.md 절차 따름

delivery:
  channel: webhook
  target_env: GOOGLE_SHEETS_WEBHOOK_URL
  on_failure: alert

safety:
  requires_confirmation: false      # 채널 자체가 시그널
  idempotent: false                 # 같은 메시지 두 번 = 두 행 (사용자 의도)
  max_retries: 0                    # 중복 행 방지 — 절대 재시도 금지
  rollback_on_failure: false

ledger:
  tags: ["journal", "write", "activity_log"]
  persist_full_payload: false       # raw 데이터는 시트에 있음

prompt: |
  역할: 개인 활동 로거. SOUL.md의 모든 규칙 엄수.

  **중요: 단일 실행 파이프라인. 확인 절차 없음. 아래 4단계를 끝까지 실행하세요.**

  ============================================================
  도구 사용 제약 (timeout 방지 — 절대 준수)
  ============================================================
  너에게 주어진 첫 turn에서 **반드시 호출해야 할 유일한 tool은 `terminal`** 이다.
  아래 tool은 *어떤 경우에도* 호출 금지:
    - skill_view, skills_list  (SKILL.md 내용은 이 prompt에 inline으로 들어있음)
    - read_file, search_files, write_file, patch  (schema/스크립트 검색 불필요)
    - memory, todo, delegate_task  (단일 실행 파이프라인 — 메모리·계획 불필요)
    - browser_*, image_generate, vision_analyze, text_to_speech, execute_code  (범위 외)
  위 도구를 단 한 번이라도 호출하면 turn budget을 낭비하고 timeout 으로 죽는다.
  Step 3의 terminal 명령이 **첫 호출 tool** 이어야 한다.

  메시지 맨 앞에 주입된 `[현재 날짜: YYYY-MM-DD (요일), 현재 시각: HH:MM KST]`
  를 기준으로 "방금", "지금", "오전 9시", "어제" 등 상대 표현을 절대 시각으로 계산.

  ## 시간 기본값 (사용자가 시각을 명시하지 않은 경우 — 절대 규칙)
  - Date: **prefix의 현재 날짜**를 그대로 사용. 절대 null 두지 말 것.
  - Start Time: 사용자가 시각을 말하지 않으면 **prefix의 현재 시각**을 사용 (예: "지금", "방금" 또는 시간 표현 자체가 없을 때).
  - End Time: 사용자가 종료 시각/지속시간 말 안 하면 null (Start만 채움).
  - "Date 누락"으로 인한 파싱 실패는 발생할 수 없다 — Date는 항상 prefix에서 채워진다.

  ============================================================
  Step 1. 24-필드 스키마 추출
  ============================================================
  사용자 발화에서 아래 정의된 24-필드 활동 기록 구조로 추출하라.
  **schema 파일을 찾으려고 하지 말 것** — 아래 enum/규칙이 곧 schema다.

  ## 추출 원칙 (10개)
  1. 사용자의 문장을 일정 기록용 데이터로만 변환한다.
  2. 없는 정보는 추측하지 말고 null로 둔다 — *단 Date/Start Time은 위 "시간 기본값" 규칙 우선*.
  3. 단, 현재 날짜/시각 기준으로 명확히 유추 가능한 값은 채운다.
     (예: "오늘", "아까", "오전", "점심 이후", "지금", "방금")
  4. 종료 시각만 불명확하면 End Time/Duration만 null. Start Time은 위 규칙대로 채움.
  5. Duration은 Start Time과 End Time이 모두 있을 때 분 단위로 계산한다.
  6. Category, Subcategory, Tags는 활동 내용을 기반으로 합리적으로 분류한다.
  7. Focus Score, Energy Score, Difficulty는 사용자가 직접 말했거나
     강하게 암시한 경우에만 1~5로 기록한다.
     - "컨디션 N" / "condition N" → Energy Score N (직접 매핑).
  8. Deep Work는 집중 작업이면 true, 단순 잡무/이동/휴식이면 false, 애매하면 null.
  9. Planned/Unplanned는 사용자가 "예정", "계획", "갑자기", "즉흥" 등을
     말했을 때만 판단한다.
  10. 응답은 반드시 JSON만 출력한다. 설명 문장은 출력하지 않는다.

  ## 한국어 어휘 처리 (오역 방지)
  - **"기상"** = 일어남/기상 (Activity, Category=Health). 절대 "weather"로 해석 금지.
  - **"취침"** = 잠자리에 듦 (Activity, Category=Health).
  - **"식사" / "밥"** = 식사 (Activity, Category=Health 또는 Life).
  - **"컨디션"** = 한국어 "신체 상태" 의미 — Energy Score 매핑 (날씨 아님).
  - **"기분"** = Mood 필드. "좋음"/"나쁨"/"평범" 등 사용자 표현 그대로 보존.

  ## Category enum (정확히 이 9개 중 하나만)
  - **Work**: 업무, 회사 일, 개발 실무, 회의
  - **Study**: 공부, 면접 준비, 강의, 독서, 기술 학습
  - **Health**: 운동, 병원, 수면, 식사 관리
  - **Life**: 집안일, 이동, 장보기, 개인 일정
  - **Rest**: 휴식, 낮잠, 회복
  - **Leisure**: 게임, 영상 시청, 취미
  - **Admin**: 서류, 정산, 메일, 일정 관리
  - **Social**: 약속, 대화, 연락
  - **Other**: 위에 속하지 않는 활동

  ## 1~5 척도

  Focus Score:
    1 = 거의 집중 못함
    2 = 자주 흐트러짐
    3 = 보통
    4 = 꽤 집중함
    5 = 완전 몰입

  Energy Score:
    1 = 매우 피곤
    2 = 피곤
    3 = 보통
    4 = 활력 있음
    5 = 매우 좋음

  Difficulty:
    1 = 매우 쉬움
    2 = 쉬움
    3 = 보통
    4 = 어려움
    5 = 매우 어려움

  ## 다중 활동 처리
  - 여러 활동이 한 메시지에 → JSON 배열 `[{...}, {...}]`
  - 단일 활동 → JSON 객체 `{...}`

  ## 출력 규칙
  - **코드펜스(```) 없이 순수 JSON만 출력** (terminal stdin으로 직접 흘려보내기 위함)
  - 설명/주석 금지
  - 미명시 필드는 null

  필수 필드(Date, Activity)가 누락되면 sheets_append 호출을 절대 하지 말고,
  Step 4 "파싱 실패" 형식으로 사용자에게 재질문.

  ============================================================
  Step 2. JSON 무결성 자체 검증
  ============================================================
  Step 1 출력을 본인이 다시 검토:
  - JSON 파싱 가능한가?
  - Date가 ISO date 형식 (YYYY-MM-DD)인가?
  - 배열/객체 둘 중 하나인가?
  - End Time이 있고 Start Time보다 이른 경우는 없는가?
    (있으면 사용자에게 재질문하고 중단)
  - Category가 9개 enum 중 하나 또는 null인가?
  - Focus/Energy/Difficulty가 1~5 정수 또는 null인가?

  실패 시 sheets_append 호출 절대 금지.

  ============================================================
  Step 3. sheets_append skill 호출 (반드시 terminal tool 호출 — 첫 tool)
  ============================================================
  **이 단계의 terminal 호출이 너의 첫 tool 호출이어야 한다.** (위 "도구 사용 제약" 참조.)

  ## terminal tool 호출 정확한 형식 (이 형식 그대로 — 변형 금지)
  - `command`: 아래 한 줄짜리 셸 명령 (printf | python3)
  - `timeout`: **30** (초 단위 — 60 이상 절대 금지, 1000 이상은 reject 됨)
  - `background`: false

  ## 셸 명령 (정확히 이 한 줄, **find/ls/grep 등으로 파일 찾지 말 것**):
  ```
  printf '%s' '<JSON>' | python3 ~/.hermes/profiles/journal_ops/skills/storage/sheets_append/scripts/post_to_sheet.py
  ```
  (`<JSON>`을 Step 1에서 추출한 순수 JSON으로 그대로 치환. 경로는 위 그대로.
  경로 검증 / 파일 존재 확인 등 사전 작업 일체 금지 — 경로는 항상 위 그대로다.)

  exit code 0 + stdout `OK rows=N`을 확인한다. 다른 exit/stdout이면 실패로 간주.

  ## 절대 금지 (각 항목 위반 = turn budget 낭비 + timeout)
  - `find`, `ls`, `grep`, `cat` 등으로 log_activity.yaml / post_to_sheet.py 찾기
  - 디렉토리 구조 탐색 (pwd, ls, tree 등)
  - timeout 60 초과 (특히 120000, 2000 등 ms 단위 착각 금지 — **단위는 초**)
  - 같은 명령 재시도 (예: command 반복)

  ============================================================
  Step 4. 결과 보고
  ============================================================

  ## 출력 규칙 (절대 준수)
  - **추론/생각/계획 텍스트를 응답에 절대 포함하지 말 것.** "We need to...",
    "Let me parse...", "사용자는 ~를 말했다", "JSON을 만들자" 같은 메타-사고
    문장 일체 금지. 응답은 사용자에게 보여줄 최종 결과 (✅/⚠️로 시작) 한 덩어리만.
  - **null이나 빈 값을 절대 응답에 포함하지 말 것.** 슬래시(/), 대시(-),
    하이픈(~) 같은 구분자는 양쪽 모두 값이 있을 때만 사용. "Focus null",
    "16:38~null", "/ null" 같은 형태가 응답에 절대 나타나선 안 된다.
  - 응답은 한국어. 활동명·고유명사는 원문 유지.
  - 응답 본문에 코드펜스(```) 사용 금지 — Discord에서 그대로 텍스트로 보여야 함.
  - 사용자의 입력 톤(반말/존대)을 응답에서도 동일하게 유지.
  - **terminal 호출 실패 시에도 추론 dump 금지.** 즉시 "⚠️ 저장 실패: ..."
    형식 (블록 "실패" 참조) 한 덩어리만 출력하고 종료.

  ============================================================
  단일 활동 — 블록 A (필수): 저장 확인
  ============================================================

  3줄 구조:
    ✅ 저장됨
      <시간 표현> / <Activity>
      <메타데이터>

  ### 2번째 줄 (시간 + 활동) 만드는 법
  - Start Time + End Time 모두 있음 → "<Start>-<End> (<Duration>분) / <Activity>"
  - Start Time만 있음                → "<Start> / <Activity>"
  - Duration만 있고 시각 없음        → "<Duration>분 / <Activity>"
  - 시각/Duration 모두 없음          → "<Activity>" (활동명 단독)

  ### 3번째 줄 (메타) 만드는 법
  - 채워진 항목만 가운뎃점(·)으로 연결.
  - 순서: Category → Focus → Energy → Difficulty → Deep Work → Mood → Location.
  - 표기: "Focus 4", "Energy 5", "난이도 3", "Deep Work" (true일 때만 표시),
    "기분: 피곤", "장소: 집".
  - 메타가 모두 비어있으면 3번째 줄 자체를 생략 (응답이 2줄짜리가 됨).

  ### 예시들 (블록 A만, 코칭 제외)
  [A] 풀 입력:
    ✅ 저장됨
      09:20-10:30 (70분) / 운동
      Health · Focus 4 · Energy 5 · Deep Work

  [B] 시간 일부 + Category만:
    ✅ 저장됨
      16:38 / 커피
      Life

  [C] 활동만:
    ✅ 저장됨
      산책
      Health

  [D] 활동만 (Category도 모름):
    ✅ 저장됨
      산책

  ============================================================
  단일 활동 — 블록 B (조건부): 누락 필드 코칭
  ============================================================

  방금 추출한 JSON에서 null/빈 값인 필드를 검사한다.
  아래 우선순위 표에서 **누락된** 필드 1~3개를 골라 자연어 예시와 함께 코칭한다.
  **이미 채워진 필드는 절대 다시 제안하지 않는다.**
  모든 우선순위 필드가 차있으면 블록 B 전체를 생략한다 (응답은 블록 A만).

  ### 출력 스키마
    💡 다음 기록부터 이런 정보도 함께 적어보세요:
      • <필드 한국어>: <자연어 표현 예시 1개 또는 2개>
      • <필드 한국어>: <자연어 표현 예시>

  ### 코칭 우선순위 표 (위가 더 가치 높음)
   1. End Time      → 예: "10시 30분까지" 또는 "30분간 했어"
   2. Focus Score   → 예: "집중도 4" (1=거의 못함 ~ 5=완전 몰입)
   3. Energy Score  → 예: "컨디션 3" (1=매우 피곤 ~ 5=매우 좋음)
   4. Mood          → 예: "피곤했어" / "상쾌했어"
   5. Difficulty    → 예: "난이도 4" (1=매우 쉬움 ~ 5=매우 어려움)
   6. Deep Work     → 예: "깊게 집중했어" 또는 "잡무였어"
   7. Outcome       → 예: 결과 한 줄 — "버그 수정 완료", "10페이지 읽음"
   8. Location      → 예: "집에서" / "카페에서"
   9. Category      → 예: "운동(Health)이야"  (보통은 LLM이 추론 가능)
  10. Subcategory   → 예: 더 구체화 — "코딩→리팩토링", "운동→유산소"
  11. Notes         → 예: 추가 메모
  12. Tags          → 예: 키워드 태그
  13. Priority      → 예: "중요한 일이었어"
  14. Interruptions → 예: "두 번 끊겼어"
  15. Device        → 예: "PC로 했어"

  ### 코칭 작성 규칙 (엄수)
  - 1~3개만 픽 — 빈 필드가 1개면 1개, 4개 이상이면 상위 3개로 제한 (4개 이상 나열 금지).
  - 한 항목에 여러 표현 예시는 슬래시(/)로 구분.
  - 사용자 입력 톤 유지 (반말 입력 → 반말 코칭, 존대 → 존대).
  - "이미 있는 것"을 다시 제안하면 사용자에게 스트레스. 절대 금지.

  ### 예시 — 입력 "지금 커피 한잔 마셨어"의 전체 응답
    ✅ 저장됨
      16:38 / 커피
      Life

    💡 다음 기록부터 이런 정보도 함께 적어보세요:
      • 종료 시각: "10분 정도 마셨어" 또는 "16:50에 다 마셨어"
      • 컨디션: "컨디션 3" (1=매우 피곤 ~ 5=매우 좋음)
      • 기분: "피곤했어" / "상쾌했어"

  ============================================================
  복수 활동 (배열 입력)
  ============================================================
    ✅ <N>건 저장됨
      • <첫 활동 1줄 요약>
      • <두번째>
      • ...

  각 항목 1줄 요약 형식: "<시간 또는 빈칸> <Activity> (<Category 또는 ?>)".
  복수 활동 시 코칭 블록 B는 **생략**한다 (잡음 방지).

  ============================================================
  실패 (sheets_append 에러)
  ============================================================
    ⚠️ 저장 실패: <에러 메시지 한 줄>
      exit=<code>, http=<status>

  ============================================================
  파싱 실패 (Step 1/2 단계) — *Activity 누락만 해당*
  ============================================================
  Date는 prefix에서 자동 채워지므로 절대 "Date 누락"으로 실패하지 말 것.
  Activity가 정말 추출 불가능한 경우만 (예: 발화가 "ㅋㅋㅋ" 같은 빈말):
    ⚠️ 24-필드 추출 실패. 발화를 다시 정리해주세요.
      누락된 필수 정보: Activity

  ============================================================
  제약
  ============================================================
  - exit 0 / HTTP 200 외 모든 결과는 실패로 간주.
  - 자동 재시도 절대 금지 (시트 중복 행 방지).
  - "저장했습니다" 텍스트만으로 종료 절대 금지 — terminal tool_result 필수.
  - 응답에 webhook URL 노출 금지.

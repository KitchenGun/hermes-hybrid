# External game watcher — process names that flip runtime_mode to "gaming".
#
# When ANY of these processes appears in the running process list, the
# scripts/game_watcher.py daemon switches the runtime mode from dev →
# gaming, which forces ollama to release VRAM and routes any in-flight
# LLM calls to the cloud (Claude family). When the game exits, the mode
# returns to dev.
#
# Match is case-insensitive on the process name only (not full path).
# To find a name: Task Manager → right-click a column header → enable
# "Process name" → look at the running game.
#
# Steam itself (steam.exe / steamwebhelper.exe) is intentionally NOT
# listed. Steam stays running 24/7 for many users, so flagging the
# launcher would keep us in gaming mode permanently. Add specific
# Steam games you play below as you start using them.

games:
  # Riot Games
  - name: "League of Legends"
    process: "League of Legends.exe"
  - name: "League Client"
    process: "LeagueClient.exe"
  - name: "Valorant"
    process: "VALORANT-Win64-Shipping.exe"
  - name: "Valorant Launcher"
    process: "VALORANT.exe"

  # Battlestate Games
  - name: "Escape from Tarkov"
    process: "EscapeFromTarkov.exe"

  # Steam games — add your own as you play them. Example:
  # - name: "Cyberpunk 2077"
  #   process: "Cyberpunk2077.exe"

# config/provider_routing.generated.yaml
#
# P0a Step 6 — provider routing 의 현재 단일-lane 정책 + 사용자가 제안한
# multi-lane 정책 (proposal_for_review). 자동 적용 절대 X.

current_policy:
  default:
    provider: claude_code_cli
    reason: |
      Phase 11 (commit cf98c65) 단일 레인 통합. Max OAuth 사용, 한도 보호 위해
      semaphore=1. opencode CLI 폐기됨. opus default 모델.
    evidence:
      - "src/orchestrator/hermes_master.py:25"
      - "src/claude_adapter/adapter.py:104"
  bench_only:
    provider: ollama
    reason: |
      scripts/bench_local_models.py 에서만 사용, 마스터 경로 미진입. WSL 내
      ollama serve 필요.
    evidence:
      - "scripts/bench_local_models.py"
      - "src/llm/adapters/ollama.py (NEEDS_REVIEW: path 확인 필요)"
  cloud_escalation:
    provider: openai
    enabled: false
    reason: |
      .env 의 OPENAI_API_KEY 가 있어도 master lane 진입 안 함. config/job_factory.yaml
      의 cloud_allowed=true 인 job_type 도 현재 escalation path 비활성.

proposed_policy:
  status: proposal_for_review
  migration_risk: high
  rationale: |
    사용자가 multi-lane (provider 별 lane 분리, job_type / cluster / 시간대 별 routing)
    을 원할 가능성. 그러나 Phase 11 single-lane 결정은 실측 비용 / 안정성 / 단일 코드 path
    근거. 이 multi-lane 은 Phase 11 ADR 반전이 됨.
  policies:
    - id: route_summarize_to_local
      condition: "job_type == 'summarize' AND len(prompt) < 800"
      provider: ollama
      model: "qwen3:4b"
      reason: "짧은 요약은 로컬 충분, 비용 0."
    - id: route_code_review_to_claude
      condition: "job_type == 'code_review'"
      provider: claude_code_cli
      reason: "Claude 코드 리뷰 강점."
    - id: route_research_to_openai
      condition: "job_type == 'web_research' AND require_web_tools"
      provider: openai
      reason: "OpenAI 가 web tool 통합 안정적 (Brave 백엔드 외 fallback)."
    - id: fallback
      provider: claude_code_cli
      reason: "any unmatched → Claude 단일 lane (기존 동작 보존)."

decision_record:
  phase_11_single_lane:
    commit: "cf98c65"
    title: "feat(master): opencode → Claude CLI (Max OAuth) lane 교체"
    rationale: |
      Max OAuth $0 marginal cost. opencode 운영 비용 + 인증 복잡도 vs Claude Max 단일 lane
      의 안정성. 결과: opus default master 단일 path.
    consequence:
      - "multi-provider 라우팅 폐기"
      - "P1: Phase 21 ABReportJob memory_inject A/B 만 유지"
      - "P2: multi-lane 재검토 시 본 yaml proposed_policy 참고"
  reversal_check_list:
    - "Max OAuth 비용 모델이 변할 경우"
    - "OpenAI / Ollama latency / quality 가 Claude 대비 충분히 우월할 경우"
    - "다중 provider failover 가 critical 한 outage 발생할 경우"

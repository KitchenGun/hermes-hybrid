# CloudPolicy — gate every Claude CLI call.
#
# Counters are in-process (reset on bot restart). The orchestrator's
# existing SQLite token ledger (Repository.add_tokens) provides the
# persistent backstop.
#
# Setting any cap to 0 disables that check. To allow truly unlimited
# Claude calls (development only), set both claude_* caps to 0.
#
# 2026-05-04: OpenAI/Anthropic API legacy fully removed. Claude CLI
# (Max OAuth, $0 marginal cost) is the only cloud lane. Caps below are
# Max session quota guards.

# ── Claude CLI auto rate caps ────────────────────────────────────
# Auto-triggered Claude (via Job Factory escalation, cron prompt wrap,
# bench LLMJudge) is capped so we don't burn the Max session quota.
#
# NOTE: bench_judge_backend="claude_cli" (the default) routes LLMJudge
# calls through this same counter. A full bench sweep (≥10 arms × 4
# dimensions × ≥5 prompts) overflows 50/day. When running a manual
# bench, raise per_day to 200 for the duration; restore to 50 once
# done. The auto BenchScheduler must use bench_judge_backend="ollama"
# so the cap stays meaningful for actual escalation.
claude_auto_calls_per_hour: 10
claude_auto_calls_per_day: 50

# ── Claude CLI concurrency / session protection ──────────────────
# Per-process cap on simultaneous Claude CLI sessions to avoid Max
# session contention. Tighter than the legacy concurrency settings.
claude_cli_concurrent_max: 3

# ── Approval thresholds ─────────────────────────────────────────
# Triggers needs_approval (Discord button) regardless of JobType
# requires_user_approval flag. Set to 0 to disable.
approval_estimated_tokens_above: 10000
approval_estimated_cost_above_usd: 0.50

# ── Token estimation heuristics ──────────────────────────────────
# Used when adapter doesn't report tokens upfront. Claude tokens are
# similar order-of-magnitude to OpenAI's tokenizer (4 chars/token).
estimated_chars_per_token: 4
minimum_estimated_input_tokens: 200       # don't under-count tiny prompts
estimated_output_tokens: 500              # ballpark response length

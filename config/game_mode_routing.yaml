# Game-mode (gaming/playtest) Claude family routing.
#
# When runtime_mode is "playtest" or "gaming", the orchestrator routes
# cloud-bound C1 calls through the Claude CLI (Max OAuth, $0 marginal
# cost). This file documents WHICH Claude alias should serve each
# job_type, derived from the 2026-05-03 bench sweep.
#
# CURRENT BEHAVIOR (2026-05-03):
# The orchestrator reads ``settings.effective_c1_claude_code_model``,
# which returns ``settings.game_mode_claude_model`` (default = "sonnet")
# in playtest/gaming mode. The per-job_type table below is informational
# — JobFactory v2 already learns these mappings from data/job_factory/
# score_matrix.json via the EpsilonGreedySelector. To enforce the per-
# job_type yaml here, future work would wire this file into the C1
# dispatch path.
#
# ============================================================
# Bench methodology (2026-05-03_v3 sweep)
# ============================================================
# - Models: claude_cli/haiku, claude_cli/sonnet, claude_cli/opus
# - Judge:  claude_cli/sonnet (mid-tier; balances quality + quota)
# - Prompts: 22 across 8 dimensions (korean, json, code_gen,
#   code_review, summarize, routing, long_context, speed)
# - Total calls: 66 model + ~108 judge = ~174 (11 minutes wall time)
# - Job_type score = weighted avg of dimension scores per
#   ``config/benchmark_prompts.yaml::job_type_to_dimension_weights``
#
# ============================================================
# Job_type score table (higher is better, 0-100)
# ============================================================
# job_type             | haiku | sonnet | opus  | best   (margin)
# ---------------------+-------+--------+-------+----------------
# code_generation      |  99.2 |  90.0  |  91.9 | haiku   +7
# code_review          |  97.4 |  91.2  |  90.7 | haiku   +6
# heavy_project_task   |  94.5 |  96.4  |  94.4 | sonnet  +2
# architecture_design  |  92.7 |  89.2  |  87.4 | haiku   +3
# document_transform   |  91.5 |  95.5  |  93.2 | sonnet  +4
# web_research         |  91.1 |  95.5  |  91.0 | sonnet  +4
# schedule_logging     |  90.8 |  94.9  |  94.6 | sonnet  +4
# simple_chat          |  89.3 |  72.3  |  75.1 | haiku  +14
# summarize            |  88.4 |  88.1  |  86.8 | tied (~haiku)
# image_asset_request  |  80.2 |  97.4  |  96.4 | sonnet +17
#
# KEY FINDINGS:
# 1. Opus never wins. Quota-heaviest model with no clear payoff.
# 2. Haiku dominates coding/simple-chat (+6 to +14 margins).
# 3. Sonnet dominates multimodal/complex-reasoning (+4 to +17).
# 4. Routing dimension: haiku 60 vs sonnet 100 — Haiku is poor at
#    intent classification.
# 5. Sonnet is the safest single default: ≥72 on every job_type.

# Default for game-mode C1 calls. Mirrors settings.game_mode_claude_model.
default: sonnet

# Per-job_type override (informational; not yet wired to dispatch path).
# Pick the empirically best model per job_type from the table above.
per_job_type:
  # Haiku-favored: coding, simple chat, architecture sketches
  code_generation: haiku
  code_review: haiku
  architecture_design: haiku
  simple_chat: haiku
  summarize: haiku        # tied — Haiku for speed

  # Sonnet-favored: multi-modal / complex reasoning
  image_asset_request: sonnet
  heavy_project_task: sonnet
  document_transform: sonnet
  web_research: sonnet
  schedule_logging: sonnet

# Latency notes (mean ms per dimension):
# - Haiku is ~2x faster than Sonnet/Opus on the speed dimension
#   (100 pass=3/3 vs Sonnet 41 / Opus 51).
# - For real-time-feeling chat during a game, Haiku still wins on
#   wall-clock even when its quality is comparable.
